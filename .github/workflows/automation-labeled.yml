name: 'Automation Labeled'

permissions: {}

on:
  pull_request:
    types: [labeled]
  issues:
    types: [labeled]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha || github.event.issue.number }}
  cancel-in-progress: ${{ github.ref_name != 'main' }}

jobs:
  needs-reproduction:
    runs-on: ubuntu-latest
    if: github.event_name == 'issues' && github.event.label.name == 'needs-reproduction'
    permissions:
      issues: write
    steps:
      - name: Create or update comment
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_USER: ${{ github.event.issue.user.login }}
        run: |
          body=$(cat <<EOF
          Hello @$ISSUE_USER 👋

          Please provide a [minimal reproduction](https://stackoverflow.com/help/minimal-reproducible-example) using a GitHub repository or [StackBlitz](https://stackblitz.com/fork/github/rolldown/rolldown-starter-stackblitz?file=README.md). This helps us understand and resolve your issue much faster.

          **A good reproduction should be:**
          - **Minimal** – include only the code necessary to demonstrate the issue
          - **Complete** – contain everything needed to run and observe the problem
          - **Reproducible** – consistently show the issue with clear steps

          Issues marked with \`needs-reproduction\` will be closed if there is no activity within 14 days.

          For more context on why this is required, please read: https://antfu.me/posts/why-reproductions-are-required

          Thanks!
          EOF
          )

          comment_id=$(gh api "repos/$GH_REPO/issues/$ISSUE_NUMBER/comments" \
            --jq '[.[] | select(.user.login == "github-actions[bot]") | select(.body | contains("Issues marked with `needs-reproduction`")) | .id] | first // empty')

          if [ -n "$comment_id" ]; then
            gh api --method PATCH "repos/$GH_REPO/issues/comments/$comment_id" -f body="$body"
          else
            gh api --method POST "repos/$GH_REPO/issues/$ISSUE_NUMBER/comments" -f body="$body"
          fi

  create_issue_if_doc_labeled_on_pr:
    if: github.event_name == 'pull_request' && github.event.label.name == 'documentation' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: read

    steps:
      - name: Create Issue from PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_USER: ${{ github.event.pull_request.user.login }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          body=$(cat <<EOF
          This issue is to track documentation tasks related to Pull Request #$PR_NUMBER.

          **PR Title:** $PR_TITLE
          **PR Author:** @$PR_USER
          **PR Link:** $PR_URL

          Please ensure all necessary documentation updates are completed.
          EOF
          )

          gh issue create \
            --title "Update doc for : $PR_TITLE #$PR_NUMBER" \
            --body "$body" \
            --assignee "$PR_USER"
