name: CI
# Jobs in this workflow are all required run successfully before the PR can be merged. This is enforced by using GitHub status checks.
# What's GitHub status check: https://docs.github.com/en/pull-requests/collaborating-with-pull-requests/collaborating-on-repositories-with-code-quality-features/about-status-checks

permissions: {}

on:
  pull_request:
    types: [opened, synchronize]
  merge_group:
  push:
    branches:
      - main
      - 'renovate/**' # For renovate bot "automerge": true
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.ref_name != 'main' }}

jobs:
  # JOB to run change detection
  changes: # https://github.com/dorny/paths-filter
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      # A Windows CI request runs the complete Windows suite, even for paths outside the normal filters.
      rust-changes: "${{ (steps.filter.outputs.rust-changes == 'true') || (github.ref_name == 'main') || (steps.pr-labels.outputs.run-windows == 'true') }}"
      node-changes: "${{ (steps.filter.outputs.node-changes == 'true') || (github.ref_name == 'main') || (steps.pr-labels.outputs.run-windows == 'true') }}"
      # Allows opting into Windows CI per-PR by adding the `ci: windows` label.
      run-windows: "${{ steps.pr-labels.outputs.run-windows == 'true' }}"
    steps:
      # Reruns keep the original event payload, so query the current labels instead.
      - name: Read pull request labels
        if: github.event_name == 'pull_request'
        id: pr-labels
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if ! run_windows="$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}" --jq '[.labels[].name] | any(. == "ci: windows")')"; then
            echo "::warning::Could not read pull request labels; running Windows CI."
            run_windows=true
          fi
          echo "run-windows=${run_windows}" >> "$GITHUB_OUTPUT"

      - uses: taiki-e/checkout-action@7d1e50e93dc4fb3bba58f85018fadf77898aee8b # v1.4.2

      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            infra-changes: &infra-changes
              - '.github/workflows/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
            rust-changes: &rust-changes
              - *infra-changes
              - 'crates/**'
              - 'tasks/**'
              - 'scripts/src/esbuild-tests/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - '.gitattributes'
              - 'justfile'
              - 'test262'
            node-changes:
              - *rust-changes
              - 'packages/**'
              - 'examples/**'
              - 'scripts/**'
              - 'rollup'
      - name: Show outputs
        run: |
          echo "Rust changes: ${{ (steps.filter.outputs.rust-changes == 'true') || (github.ref_name == 'main') || (steps.pr-labels.outputs.run-windows == 'true') }}"
          echo "Node changes: ${{ (steps.filter.outputs.node-changes == 'true') || (github.ref_name == 'main') || (steps.pr-labels.outputs.run-windows == 'true') }}"

  rust-validation:
    name: Rust Validation
    needs: changes
    if: ${{ needs.changes.outputs.rust-changes == 'true' }}
    runs-on: namespace-profile-linux-x64-default
    steps:
      - uses: taiki-e/checkout-action@7d1e50e93dc4fb3bba58f85018fadf77898aee8b # v1.4.2

      - name: Setup Rust
        uses: oxc-project/setup-rust@3d6fb132fbe7cdcb66bf8ec193911c2945369d12 # v1.0.17
        with:
          tools: just
          cache-key: lint
          save-cache: ${{ github.ref_name == 'main' }}
          components: clippy rustfmt

      - run: just lint-rust

      - name: Check allocations
        run: |
          cargo allocs
          git diff --exit-code -- tasks/track_memory_allocations/allocs.snap ||
          (echo 'Allocations have changed. Run `just allocs` to update the snapshot, otherwise please fix the regression.' && exit 1)

  cargo-test:
    needs: changes
    strategy:
      matrix:
        target: >-
          ${{ (github.ref_name == 'main') && fromJSON('["ubuntu-latest","macos-latest","windows-latest"]')
              || (needs.changes.outputs.run-windows == 'true') && fromJSON('["ubuntu-latest","windows-latest"]')
              || fromJSON('["ubuntu-latest"]') }}
    uses: ./.github/workflows/reusable-cargo-test.yml
    with:
      os: ${{ matrix.target }}
      changed: ${{ needs.changes.outputs.rust-changes == 'true' }}

  node-test-windows:
    needs: [changes, build-rolldown-windows]
    uses: ./.github/workflows/reusable-node-test.yml
    if: |
      (github.ref_name == 'main' || needs.changes.outputs.run-windows == 'true') &&
      always() &&
      (needs.build-rolldown-windows.result == 'success' || needs.build-rolldown-windows.result == 'skipped')
    with:
      os: windows-latest
      node-version: 24
      changed: ${{ needs.changes.outputs.node-changes == 'true' }}

  node-test-macos:
    needs: [changes, build-rolldown-macos]
    uses: ./.github/workflows/reusable-node-test.yml
    if: |
      github.ref_name == 'main' &&
      always() &&
      (needs.build-rolldown-macos.result == 'success' || needs.build-rolldown-macos.result == 'skipped')
    with:
      os: macos-latest
      node-version: 24
      changed: ${{ needs.changes.outputs.node-changes == 'true' }}

  node-test-ubuntu:
    needs: [changes, build-rolldown-ubuntu]
    # Matrix is defined here (not inside reusable-node-test.yml) because when the
    # reusable workflow's job is skipped via `if: inputs.changed`, an internal matrix
    # would never expand — producing zero jobs instead of skipped ones. GitHub required
    # status checks need the job names to exist (even as "skipped") to pass.
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22, 24]
    uses: ./.github/workflows/reusable-node-test.yml
    if: |
      always() &&
      (needs.build-rolldown-ubuntu.result == 'success' || needs.build-rolldown-ubuntu.result == 'skipped')
    with:
      os: ubuntu-latest
      node-version: ${{ matrix.node-version }}
      changed: ${{ needs.changes.outputs.node-changes == 'true' }}

  wasi:
    needs: changes
    uses: ./.github/workflows/reusable-wasi.yml
    with:
      changed: ${{ needs.changes.outputs.node-changes == 'true' }}

  node-dev-server-test-windows:
    needs: [changes, build-rolldown-windows]
    uses: ./.github/workflows/reusable-node-dev-server-test.yml
    if: |
      (github.ref_name == 'main' || needs.changes.outputs.run-windows == 'true') &&
      always() &&
      (needs.build-rolldown-windows.result == 'success' || needs.build-rolldown-windows.result == 'skipped')
    with:
      os: windows-latest
      node-version: 24
      changed: ${{ needs.changes.outputs.node-changes == 'true' }}

  node-dev-server-test-macos:
    needs: [changes, build-rolldown-macos]
    uses: ./.github/workflows/reusable-node-dev-server-test.yml
    if: |
      github.ref_name == 'main' &&
      always() &&
      (needs.build-rolldown-macos.result == 'success' || needs.build-rolldown-macos.result == 'skipped')
    with:
      os: macos-latest
      node-version: 24
      changed: ${{ needs.changes.outputs.node-changes == 'true' }}

  node-dev-server-test-ubuntu:
    needs: [changes, build-rolldown-ubuntu]
    # Matrix is defined here (not inside reusable-node-dev-server-test.yml) because when the
    # reusable workflow's job is skipped via `if: inputs.changed`, an internal matrix
    # would never expand — producing zero jobs instead of skipped ones. GitHub required
    # status checks need the job names to exist (even as "skipped") to pass.
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22, 24]
    uses: ./.github/workflows/reusable-node-dev-server-test.yml
    if: |
      always() &&
      (needs.build-rolldown-ubuntu.result == 'success' || needs.build-rolldown-ubuntu.result == 'skipped')
    with:
      os: ubuntu-latest
      node-version: ${{ matrix.node-version }}
      changed: ${{ needs.changes.outputs.node-changes == 'true' }}

  vite-test-ubuntu:
    name: Vite Test Ubuntu
    needs: [changes, build-rolldown-ubuntu]
    if: |
      always() &&
      (needs.build-rolldown-ubuntu.result == 'success' || needs.build-rolldown-ubuntu.result == 'skipped')
    runs-on: namespace-profile-linux-x64-default
    timeout-minutes: 30
    steps:
      - uses: taiki-e/checkout-action@7d1e50e93dc4fb3bba58f85018fadf77898aee8b # v1.4.2

      - uses: voidzero-dev/setup-vp@250f29ce396baf5e8f24498e17c0dfdebabc26eb # v1.15.0
        with:
          version: '0.2.1'
          cache: true

      - name: Download Native Rolldown Build
        if: ${{ needs.changes.outputs.node-changes == 'true' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: rolldown-native-ubuntu-latest
          path: packages/rolldown/dist

      - name: Configure Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      # `just setup-vite` is the only entry point that touches `vite/`;
      # run.ts only clones the prepared checkout.
      - name: Setup Vite checkout
        if: ${{ needs.changes.outputs.node-changes == 'true' }}
        run: vp run --filter '@rolldown-internal/scripts' setup-vite

      - name: Run Vite Tests
        if: ${{ needs.changes.outputs.node-changes == 'true' }}
        run: vp run --filter vite-tests test

  vite-test-windows:
    name: Vite Test Windows
    needs: [changes, build-rolldown-windows]
    if: |
      (github.ref_name == 'main' || needs.changes.outputs.run-windows == 'true') &&
      always() &&
      (needs.build-rolldown-windows.result == 'success' || needs.build-rolldown-windows.result == 'skipped')
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: taiki-e/checkout-action@7d1e50e93dc4fb3bba58f85018fadf77898aee8b # v1.4.2

      - uses: samypr100/setup-dev-drive@30f0f98ae5636b2b6501e181dfb3631b9974818d # v4.0.0
        with:
          drive-size: 12GB
          drive-format: ReFS
          env-mapping: |
            PNPM_HOME,{{ DEV_DRIVE }}/.pnpm

      - uses: voidzero-dev/setup-vp@250f29ce396baf5e8f24498e17c0dfdebabc26eb # v1.15.0
        with:
          version: '0.2.1'
          cache: true

      - name: Download Native Rolldown Build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: rolldown-native-windows-latest
          path: packages/rolldown/dist

      - name: Configure Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      # `just setup-vite` is the only entry point that touches `vite/`;
      # run.ts only clones the prepared checkout.
      - name: Setup Vite checkout
        if: ${{ needs.changes.outputs.node-changes == 'true' }}
        run: vp run --filter '@rolldown-internal/scripts' setup-vite

      - name: Run Vite Tests
        if: ${{ needs.changes.outputs.node-changes == 'true' }}
        run: vp run --filter vite-tests test

  build-rolldown-windows:
    needs: changes
    if: github.ref_name == 'main' || needs.changes.outputs.run-windows == 'true'
    uses: ./.github/workflows/reusable-native-build.yml
    with:
      changed: ${{ needs.changes.outputs.node-changes == 'true' }}
      os: windows-latest

  build-rolldown-macos:
    needs: changes
    if: github.ref_name == 'main'
    uses: ./.github/workflows/reusable-native-build.yml
    with:
      changed: ${{ needs.changes.outputs.node-changes == 'true' }}
      os: macos-latest

  build-rolldown-ubuntu:
    needs: changes
    uses: ./.github/workflows/reusable-native-build.yml
    with:
      changed: ${{ needs.changes.outputs.node-changes == 'true' }}
      os: ubuntu-latest

  node-validation:
    name: Node Validation
    needs: [changes, build-rolldown-ubuntu]
    if: ${{ needs.changes.outputs.node-changes == 'true' }}
    runs-on: namespace-profile-linux-x64-default
    steps:
      - uses: taiki-e/checkout-action@7d1e50e93dc4fb3bba58f85018fadf77898aee8b # v1.4.2

      - name: Setup Rust
        uses: oxc-project/setup-rust@3d6fb132fbe7cdcb66bf8ec193911c2945369d12 # v1.0.17
        with:
          tools: just
          cache-key: native-build
          save-cache: false

      - uses: voidzero-dev/setup-vp@250f29ce396baf5e8f24498e17c0dfdebabc26eb # v1.15.0
        with:
          version: '0.2.1'
          cache: true

      - name: Download Native Rolldown Build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: rolldown-native-ubuntu-latest
          path: packages/rolldown/dist

      - name: Add WASI target
        run: rustup target add wasm32-wasip1-threads

      - name: Build @rolldown/browser
        run: just build-browser

      - name: Build @rolldown/debug
        run: just build-rolldown-debug

      - name: Build `@rolldown/test-dev-server`
        run: vp run --filter '@rolldown/test-dev-server' build

      - name: Make sure generated code of `@rolldown/debug` is up-to-date
        run: git diff --exit-code

      - name: Lint Code
        run: vp lint

      - name: Node Type Test
        run: vp run --filter rolldown-tests test:types

      - name: Lint publint
        run: vp run lint-publint

      - name: Lint exports & dependencies
        run: vp run lint-knip

      - name: Validate workspace package
        run: node scripts/misc/published-package-check.mjs

  repo-validation:
    name: Repo Validation
    runs-on: namespace-profile-linux-x64-default
    steps:
      - uses: taiki-e/checkout-action@7d1e50e93dc4fb3bba58f85018fadf77898aee8b # v1.4.2

      - name: Setup Rust
        uses: oxc-project/setup-rust@3d6fb132fbe7cdcb66bf8ec193911c2945369d12 # v1.0.17
        with:
          cache-key: repo-validation
          save-cache: ${{ github.ref_name == 'main' }}
          components: rustfmt

      - uses: voidzero-dev/setup-vp@250f29ce396baf5e8f24498e17c0dfdebabc26eb # v1.15.0
        with:
          version: '0.2.1'
          cache: true

      - name: Lint Filename
        run: cargo ls-lint

      - name: update generated code
        run: |
          cargo run --bin generator
          git diff --exit-code

  typos:
    name: Spell Check
    runs-on: ubuntu-latest
    steps:
      - uses: taiki-e/checkout-action@7d1e50e93dc4fb3bba58f85018fadf77898aee8b # v1.4.2
      - uses: crate-ci/typos@bee27e3a4fd1ea2111cf90ab89cd076c870fce14 # v1.48.0
        with:
          files: .
