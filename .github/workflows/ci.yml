name: CI
# Jobs in this workflow are all required run successfully before the PR can be merged. This is enforced by using GitHub status checks.
# What's GitHub status check: https://docs.github.com/en/pull-requests/collaborating-with-pull-requests/collaborating-on-repositories-with-code-quality-features/about-status-checks

permissions: {}

on:
  pull_request:
    types: [opened, synchronize]
  merge_group:
  push:
    branches:
      - main
      - 'renovate/**' # For renovate bot "automerge": true
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.ref_name != 'main' }}

jobs:
  # JOB to run change detection
  changes: # https://github.com/dorny/paths-filter
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      rust-changes: ${{ (steps.filter.outputs.rust-changes == 'true') || (github.ref_name == 'main') }}
      node-changes: ${{ (steps.filter.outputs.node-changes == 'true') || (github.ref_name == 'main') }}
      pluginutils-changes: ${{ (steps.filter.outputs.pluginutils-changes == 'true') || (github.ref_name == 'main') }}
      docs-changes: ${{ (steps.filter.outputs.docs-changes == 'true') || (github.ref_name == 'main') }}
      # Allows opting into Windows CI per-PR by adding the `ci: windows` label.
      run-windows: "${{ (github.event_name == 'pull_request') && contains(github.event.pull_request.labels.*.name, 'ci: windows') }}"
    steps:
      - uses: taiki-e/checkout-action@7d1e50e93dc4fb3bba58f85018fadf77898aee8b # v1.4.2

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            infra-changes: &infra-changes
              - '.github/workflows/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
            rust-changes: &rust-changes
              - *infra-changes
              - 'crates/**'
              - 'tasks/**'
              - 'scripts/src/esbuild-tests/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - '.gitattributes'
              - 'justfile'
              - 'test262'
            node-changes:
              - *rust-changes
              - 'packages/**'
              - 'examples/**'
              - 'scripts/**'
              - 'rollup'
            pluginutils-changes:
              - *infra-changes
              - 'packages/pluginutils/**'
            docs-changes:
              - *infra-changes
              - 'docs/**'
              - 'packages/rolldown/src/**'
              - 'packages/rolldown/package.json'
              - 'packages/rolldown/tsconfig*.json'
              - 'packages/pluginutils/**'
      - name: Show outputs
        run: |
          echo "Rust changes: ${{ (steps.filter.outputs.rust-changes == 'true') || (github.ref_name == 'main') }}"
          echo "Node changes: ${{ (steps.filter.outputs.node-changes == 'true') || (github.ref_name == 'main') }}"
          echo "PluginUtils changes: ${{ (steps.filter.outputs.pluginutils-changes == 'true') || (github.ref_name == 'main') }}"
          echo "Docs changes: ${{ (steps.filter.outputs.docs-changes == 'true') || (github.ref_name == 'main') }}"

  rust-validation:
    name: Rust Validation
    needs: changes
    if: ${{ needs.changes.outputs.rust-changes == 'true' }}
    runs-on: namespace-profile-linux-x64-default
    steps:
      - uses: taiki-e/checkout-action@7d1e50e93dc4fb3bba58f85018fadf77898aee8b # v1.4.2

      - name: Setup Rust
        uses: oxc-project/setup-rust@23f38cfb0c04af97a055f76acee94d5be71c7c82 # v1.0.16
        with:
          tools: just
          cache-key: lint
          save-cache: ${{ github.ref_name == 'main' }}
          components: clippy rustfmt

      - run: just lint-rust

  cargo-test:
    needs: changes
    strategy:
      matrix:
        target: >-
          ${{ (github.ref_name == 'main') && fromJSON('["ubuntu-latest","macos-latest","windows-latest"]')
              || (needs.changes.outputs.run-windows == 'true') && fromJSON('["ubuntu-latest","windows-latest"]')
              || fromJSON('["ubuntu-latest"]') }}
    uses: ./.github/workflows/reusable-cargo-test.yml
    with:
      os: ${{ matrix.target }}
      changed: ${{ needs.changes.outputs.rust-changes == 'true' }}

  node-test-windows:
    needs: [changes, build-rolldown-windows]
    uses: ./.github/workflows/reusable-node-test.yml
    if: |
      (github.ref_name == 'main' || needs.changes.outputs.run-windows == 'true') &&
      always() &&
      (needs.build-rolldown-windows.result == 'success' || needs.build-rolldown-windows.result == 'skipped')
    with:
      os: windows-latest
      node-version: 24
      changed: ${{ needs.changes.outputs.node-changes == 'true' }}

  node-test-macos:
    needs: [changes, build-rolldown-macos]
    uses: ./.github/workflows/reusable-node-test.yml
    if: |
      github.ref_name == 'main' &&
      always() &&
      (needs.build-rolldown-macos.result == 'success' || needs.build-rolldown-macos.result == 'skipped')
    with:
      os: macos-latest
      node-version: 24
      changed: ${{ needs.changes.outputs.node-changes == 'true' }}

  node-test-ubuntu:
    needs: [changes, build-rolldown-ubuntu]
    # Matrix is defined here (not inside reusable-node-test.yml) because when the
    # reusable workflow's job is skipped via `if: inputs.changed`, an internal matrix
    # would never expand — producing zero jobs instead of skipped ones. GitHub required
    # status checks need the job names to exist (even as "skipped") to pass.
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22, 24]
    uses: ./.github/workflows/reusable-node-test.yml
    if: |
      always() &&
      (needs.build-rolldown-ubuntu.result == 'success' || needs.build-rolldown-ubuntu.result == 'skipped')
    with:
      os: ubuntu-latest
      node-version: ${{ matrix.node-version }}
      changed: ${{ needs.changes.outputs.node-changes == 'true' }}

  node-dev-server-test-windows:
    needs: [changes, build-rolldown-windows]
    uses: ./.github/workflows/reusable-node-dev-server-test.yml
    if: |
      (github.ref_name == 'main' || needs.changes.outputs.run-windows == 'true') &&
      always() &&
      (needs.build-rolldown-windows.result == 'success' || needs.build-rolldown-windows.result == 'skipped')
    with:
      os: windows-latest
      node-version: 24
      changed: ${{ needs.changes.outputs.node-changes == 'true' }}

  node-dev-server-test-macos:
    needs: [changes, build-rolldown-macos]
    uses: ./.github/workflows/reusable-node-dev-server-test.yml
    if: |
      github.ref_name == 'main' &&
      always() &&
      (needs.build-rolldown-macos.result == 'success' || needs.build-rolldown-macos.result == 'skipped')
    with:
      os: macos-latest
      node-version: 24
      changed: ${{ needs.changes.outputs.node-changes == 'true' }}

  node-dev-server-test-ubuntu:
    needs: [changes, build-rolldown-ubuntu]
    # Matrix is defined here (not inside reusable-node-dev-server-test.yml) because when the
    # reusable workflow's job is skipped via `if: inputs.changed`, an internal matrix
    # would never expand — producing zero jobs instead of skipped ones. GitHub required
    # status checks need the job names to exist (even as "skipped") to pass.
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22, 24]
    uses: ./.github/workflows/reusable-node-dev-server-test.yml
    if: |
      always() &&
      (needs.build-rolldown-ubuntu.result == 'success' || needs.build-rolldown-ubuntu.result == 'skipped')
    with:
      os: ubuntu-latest
      node-version: ${{ matrix.node-version }}
      changed: ${{ needs.changes.outputs.node-changes == 'true' }}

  vite-test-ubuntu:
    name: Vite Test Ubuntu
    needs: [changes, build-rolldown-ubuntu]
    if: |
      always() &&
      (needs.build-rolldown-ubuntu.result == 'success' || needs.build-rolldown-ubuntu.result == 'skipped')
    runs-on: namespace-profile-linux-x64-default
    timeout-minutes: 30
    steps:
      - uses: taiki-e/checkout-action@7d1e50e93dc4fb3bba58f85018fadf77898aee8b # v1.4.2

      - uses: voidzero-dev/setup-vp@4f5aa3e38c781f1b01e78fb9255527cee8a6efa6 # v1.8.0
        with:
          cache: true

      - name: Download Native Rolldown Build
        if: ${{ needs.changes.outputs.node-changes == 'true' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: rolldown-native-ubuntu-latest
          path: ./packages

      - name: Configure Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Run Vite Tests
        if: ${{ needs.changes.outputs.node-changes == 'true' }}
        run: vp run --filter vite-tests test

  vite-test-windows:
    name: Vite Test Windows
    needs: [changes, build-rolldown-windows]
    if: |
      (github.ref_name == 'main' || needs.changes.outputs.run-windows == 'true') &&
      always() &&
      (needs.build-rolldown-windows.result == 'success' || needs.build-rolldown-windows.result == 'skipped')
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: taiki-e/checkout-action@7d1e50e93dc4fb3bba58f85018fadf77898aee8b # v1.4.2

      - uses: samypr100/setup-dev-drive@30f0f98ae5636b2b6501e181dfb3631b9974818d # v4.0.0
        with:
          drive-size: 12GB
          drive-format: ReFS
          env-mapping: |
            PNPM_HOME,{{ DEV_DRIVE }}/.pnpm

      - uses: voidzero-dev/setup-vp@4f5aa3e38c781f1b01e78fb9255527cee8a6efa6 # v1.8.0
        with:
          cache: true

      - name: Download Native Rolldown Build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: rolldown-native-windows-latest
          path: ./packages

      - name: Configure Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Run Vite Tests
        if: ${{ needs.changes.outputs.node-changes == 'true' }}
        run: vp run --filter vite-tests test

  build-rolldown-windows:
    needs: changes
    if: github.ref_name == 'main' || needs.changes.outputs.run-windows == 'true'
    uses: ./.github/workflows/reusable-native-build.yml
    with:
      changed: ${{ needs.changes.outputs.node-changes == 'true' }}
      os: windows-latest

  build-rolldown-macos:
    needs: changes
    if: github.ref_name == 'main'
    uses: ./.github/workflows/reusable-native-build.yml
    with:
      changed: ${{ needs.changes.outputs.node-changes == 'true' }}
      os: macos-latest

  build-rolldown-ubuntu:
    needs: changes
    uses: ./.github/workflows/reusable-native-build.yml
    with:
      changed: ${{ needs.changes.outputs.node-changes == 'true' }}
      os: ubuntu-latest

  pluginutils-test:
    name: Pluginutils Test
    needs: changes
    if: ${{ needs.changes.outputs.pluginutils-changes == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: taiki-e/checkout-action@7d1e50e93dc4fb3bba58f85018fadf77898aee8b # v1.4.2

      - uses: voidzero-dev/setup-vp@4f5aa3e38c781f1b01e78fb9255527cee8a6efa6 # v1.8.0
        with:
          cache: true

      - name: Test `@rolldown/pluginutils`
        run: vp run --filter '@rolldown/pluginutils' test

  node-validation:
    name: Node Validation
    needs: [changes, build-rolldown-ubuntu]
    if: ${{ needs.changes.outputs.node-changes == 'true' }}
    runs-on: namespace-profile-linux-x64-default
    steps:
      - uses: taiki-e/checkout-action@7d1e50e93dc4fb3bba58f85018fadf77898aee8b # v1.4.2

      - name: Setup Rust
        uses: oxc-project/setup-rust@23f38cfb0c04af97a055f76acee94d5be71c7c82 # v1.0.16
        with:
          tools: just
          cache-key: native-build
          save-cache: false

      - uses: voidzero-dev/setup-vp@4f5aa3e38c781f1b01e78fb9255527cee8a6efa6 # v1.8.0
        with:
          cache: true

      - name: Download Native Rolldown Build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: rolldown-native-ubuntu-latest
          path: ./packages

      - name: Add WASI target
        run: rustup target add wasm32-wasip1-threads

      - name: Build @rolldown/browser
        run: just build-browser

      - name: Build @rolldown/debug
        run: just build-rolldown-debug

      - name: Build `@rolldown/test-dev-server`
        run: vp run --filter '@rolldown/test-dev-server' build

      - name: Make sure generated code of `@rolldown/debug` is up-to-date
        run: git diff --exit-code

      - name: Build @rolldown/pluginutils
        run: just build-pluginutils

      - name: Lint Code
        run: vp lint

      - name: Node Type Test
        run: vp run --filter rolldown-tests test:types

      - name: Lint publint
        run: vp run lint-publint

      - name: Lint exports & dependencies
        run: vp run lint-knip

      - name: Validate workspace package
        run: node scripts/misc/published-package-check.mjs

  repo-validation:
    name: Repo Validation
    runs-on: namespace-profile-linux-x64-default
    steps:
      - uses: taiki-e/checkout-action@7d1e50e93dc4fb3bba58f85018fadf77898aee8b # v1.4.2

      - name: Setup Rust
        uses: oxc-project/setup-rust@23f38cfb0c04af97a055f76acee94d5be71c7c82 # v1.0.16
        with:
          cache-key: repo-validation
          save-cache: ${{ github.ref_name == 'main' }}
          components: rustfmt

      - uses: voidzero-dev/setup-vp@4f5aa3e38c781f1b01e78fb9255527cee8a6efa6 # v1.8.0
        with:
          cache: true

      - name: Lint Filename
        run: cargo ls-lint

      - name: update generated code
        run: |
          cargo run --bin generator
          git diff --exit-code

  typos:
    name: Spell Check
    runs-on: ubuntu-latest
    steps:
      - uses: taiki-e/checkout-action@7d1e50e93dc4fb3bba58f85018fadf77898aee8b # v1.4.2
      - uses: crate-ci/typos@cf5f1c29a8ac336af8568821ec41919923b05a83 # v1.45.1
        with:
          files: .

  docs-validation:
    name: Docs Validation
    needs: changes
    if: ${{ needs.changes.outputs.docs-changes == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: taiki-e/checkout-action@7d1e50e93dc4fb3bba58f85018fadf77898aee8b # v1.4.2

      - uses: voidzero-dev/setup-vp@4f5aa3e38c781f1b01e78fb9255527cee8a6efa6 # v1.8.0
        with:
          cache: true

      - name: Build @rolldown/pluginutils
        run: vp run --filter '@rolldown/pluginutils' build

      - name: Build Docs
        run: vp run docs:build
