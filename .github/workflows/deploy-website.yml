name: Deploy Website

permissions: {}

on:
  pull_request:
    types: [opened, synchronize]
  merge_group:
  push:
    branches:
      - main
    # These inputs can affect the rendered site, so a change here is worth *checking*.
    # Whether we actually deploy is decided by the built-output diff below, not by the path.
    paths:
      - 'docs/**'
      - 'packages/rolldown/src/**'
      - 'packages/rolldown/package.json'
      - 'packages/rolldown/tsconfig*.json'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.ref_name != 'main' }}

jobs:
  # Builds/validates the docs and decides whether a deploy is needed. Runs untrusted PR code,
  # so it has NO `environment` and NO access to VOID_TOKEN. The deploy is a separate main-only
  # job below.
  docs-validation:
    name: Docs Validation
    runs-on: ubuntu-latest
    outputs:
      deploy: ${{ steps.gate.outputs.deploy }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2 # need the previous commit to build & compare against
          persist-credentials: false

      - uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1.10.0
        with:
          cache: true

      # Builds the whole site for HEAD. Doubles as the PR validation build.
      - name: Build Docs
        run: |
          vp run --filter rolldown-docs generate
          vp run --filter rolldown-docs build

      - name: Decide whether to deploy
        id: gate
        if: github.ref_name == 'main'
        run: |
          set -uo pipefail
          # Deploy only when the built site actually changed vs the previous commit. We build
          # both commits and diff the dist. The build is reproducible (group-icons selector
          # ordering is patched); the only non-deterministic outputs are the generated
          # llms*.txt aggregations, which we exclude — any real content change shows up in the
          # HTML anyway. A packages/rolldown/src change that doesn't alter the rendered output
          # therefore produces an identical dist and is skipped.
          mv docs/.vitepress/dist /tmp/dist-head

          changed=1 # default to deploying
          if git checkout HEAD^ -- docs packages/rolldown \
            && vp run --filter rolldown-docs generate \
            && vp run --filter rolldown-docs build; then
            mv docs/.vitepress/dist /tmp/dist-prev
            if diff -rq -x 'llms.txt' -x 'llms-full.txt' /tmp/dist-head /tmp/dist-prev >/dev/null 2>&1; then
              changed=0
            fi
          else
            echo "Could not build the previous commit; deploying to be safe."
          fi
          git checkout HEAD -- docs packages/rolldown || true

          if [ "$changed" -eq 0 ] && [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            echo "deploy=false" >> "$GITHUB_OUTPUT"
            echo "Built site unchanged since the previous commit — skipping deploy."
          else
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          fi

  # Deploy to Void. Isolated, main-only job: the only place VOID_TOKEN is in scope, and it runs
  # only when docs-validation determined the built site changed.
  deploy-void:
    name: Deploy to Void
    needs: [docs-validation]
    if: github.ref_name == 'main' && needs.docs-validation.outputs.deploy == 'true'
    runs-on: ubuntu-latest
    environment: void
    steps:
      - uses: taiki-e/checkout-action@7d1e50e93dc4fb3bba58f85018fadf77898aee8b # v1.4.2

      - uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1.10.0
        with:
          cache: true

      - name: Deploy to Void
        run: vp run docs:void
        env:
          VOID_TOKEN: ${{ secrets.VOID_TOKEN }}
          VOID_PROJECT: rolldown
