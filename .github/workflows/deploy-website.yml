name: Deploy Website

permissions: {}

on:
  pull_request:
    types: [opened, synchronize]
  merge_group:
  push:
    branches:
      - main
    # These inputs can affect the rendered site, so a change here is worth *checking*.
    # Whether we actually deploy is decided by the content comparison below, not by the path.
    paths:
      - 'docs/**'
      - 'packages/rolldown/src/**'
      - 'packages/rolldown/package.json'
      - 'packages/rolldown/tsconfig*.json'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.ref_name != 'main' }}

jobs:
  # Builds/validates the docs and decides whether a deploy is needed. Runs untrusted PR code,
  # so it has NO `environment` and NO access to VOID_TOKEN. The deploy is a separate main-only
  # job below.
  docs-validation:
    name: Docs Validation
    runs-on: ubuntu-latest
    outputs:
      deploy: ${{ steps.gate.outputs.deploy }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2 # need the previous commit to compare against
          persist-credentials: false

      - uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1.10.0
        with:
          cache: true

      - name: Generate API reference
        run: vp run --filter rolldown-docs generate

      - name: Build Docs
        if: github.ref_name != 'main'
        run: vp run --filter rolldown-docs build

      - name: Decide whether to deploy
        id: gate
        if: github.ref_name == 'main'
        run: |
          set -uo pipefail
          # Deploy only when the docs content actually changed vs the previous commit. We
          # compare the *generated* content that drives the site — the git-tracked docs sources
          # plus the TypeDoc-generated reference (docs/reference) — instead of the built dist,
          # which is not reproducible (some vitepress plugins emit unstable ordering). TypeDoc
          # output is deterministic, so a packages/rolldown/src change that doesn't alter the
          # public API yields an identical reference and is skipped.
          fingerprint() {
            { git ls-files -z -- docs; find docs/reference -type f -print0; } \
              | LC_ALL=C sort -zu | xargs -0 sha256sum | sha256sum | cut -d' ' -f1
          }

          head_fp="$(fingerprint)" # docs/reference was generated for HEAD above

          # Regenerate the reference from the previous commit and fingerprint that. Any failure
          # here (e.g. a dependency change between commits) falls through to deploying.
          prev_fp=""
          if git checkout HEAD^ -- docs packages/rolldown && vp run --filter rolldown-docs generate; then
            prev_fp="$(fingerprint)"
          fi
          git checkout HEAD -- docs packages/rolldown || true

          echo "HEAD:     $head_fp"
          echo "previous: ${prev_fp:-<unavailable>}"
          if [ -n "$prev_fp" ] && [ "$head_fp" = "$prev_fp" ] && [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            echo "deploy=false" >> "$GITHUB_OUTPUT"
            echo "Docs content unchanged since the previous commit — skipping deploy."
          else
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          fi

  # Deploy to Void. Isolated, main-only job: the only place VOID_TOKEN is in scope, and it runs
  # only when docs-validation determined the content changed.
  deploy-void:
    name: Deploy to Void
    needs: [docs-validation]
    if: github.ref_name == 'main' && needs.docs-validation.outputs.deploy == 'true'
    runs-on: ubuntu-latest
    environment: void
    steps:
      - uses: taiki-e/checkout-action@7d1e50e93dc4fb3bba58f85018fadf77898aee8b # v1.4.2

      - uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1.10.0
        with:
          cache: true

      - name: Deploy to Void
        run: vp run docs:void
        env:
          VOID_TOKEN: ${{ secrets.VOID_TOKEN }}
          VOID_PROJECT: rolldown
