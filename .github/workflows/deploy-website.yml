name: Deploy Website

permissions: {}

on:
  pull_request:
    types: [opened, synchronize]
  merge_group:
  push:
    branches:
      - main
    # These inputs can affect the rendered site, so a change here is worth *checking*.
    # Whether we actually deploy is decided by the content comparison below, not by the path.
    paths:
      - 'docs/**'
      - 'packages/rolldown/src/**'
      - 'packages/rolldown/package.json'
      - 'packages/rolldown/tsconfig*.json'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.ref_name != 'main' }}

jobs:
  # Builds/validates the docs and decides whether the generated content changed. Runs untrusted
  # PR code, so it has NO `environment` and NO access to VOID_TOKEN. The deploy is a separate
  # main-only job below.
  docs-validation:
    name: Docs Validation
    runs-on: ubuntu-latest
    outputs:
      deploy: ${{ steps.gate.outputs.deploy }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2 # need the previous commit on main; the PR baseline is fetched below
          persist-credentials: false

      - uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1.10.0
        with:
          cache: true

      # Builds the whole site for the current ref. Doubles as the PR validation build.
      - name: Build Docs
        run: |
          vp run --filter rolldown-docs generate
          vp run --filter rolldown-docs build

      - name: Compare generated content against baseline
        id: gate
        if: github.event_name != 'merge_group'
        env:
          REF_NAME: ${{ github.ref_name }}
          BASE_REF: ${{ github.base_ref }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -uo pipefail
          # Compare the generated docs content against a baseline and deploy (main only) when it
          # differs. Baseline:
          #   - on main: the previous commit
          #   - on a PR: the target branch (main)
          # We fingerprint the *generated* content — git-tracked docs sources plus the TypeDoc
          # reference (docs/reference) — rather than the built dist, which is not reproducible
          # (some vitepress plugins emit unstable ordering). TypeDoc output is deterministic, so a
          # packages/rolldown/src change that doesn't alter the public API yields an identical
          # reference and is skipped.
          if [ "$REF_NAME" = "main" ]; then
            base="HEAD^"
          else
            base_branch="${BASE_REF:-main}"
            git fetch --no-tags --depth=1 origin "$base_branch" >/dev/null 2>&1 || true
            base="origin/$base_branch"
          fi

          fingerprint() {
            { git ls-files -z -- docs; find docs/reference -type f -print0; } \
              | LC_ALL=C sort -zu | xargs -0 sha256sum | sha256sum | cut -d' ' -f1
          }
          head_fp="$(fingerprint)" # docs/reference was generated for HEAD by the build above

          # Regenerate the reference from the baseline and fingerprint it. Any failure (e.g. a
          # dependency change between commits) falls through to deploying.
          prev_fp=""
          if git checkout "$base" -- docs packages/rolldown && vp run --filter rolldown-docs generate; then
            prev_fp="$(fingerprint)"
          fi
          git checkout HEAD -- docs packages/rolldown || true

          deploy=false
          if [ -z "$prev_fp" ] || [ "$head_fp" != "$prev_fp" ] || [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            deploy=true
          fi
          echo "deploy=$deploy" >> "$GITHUB_OUTPUT"

          if [ "$deploy" = "false" ]; then
            msg="Docs content unchanged vs \`$base\`."
          else
            msg="Docs content changed vs \`$base\`."
          fi
          echo "$msg (deploy=$deploy)"
          echo "$msg" >> "$GITHUB_STEP_SUMMARY"

  # Deploy to Void. Isolated, main-only job: the only place VOID_TOKEN is in scope, and it runs
  # only when docs-validation determined the generated content changed.
  deploy-void:
    name: Deploy to Void
    needs: [docs-validation]
    if: github.ref_name == 'main' && needs.docs-validation.outputs.deploy == 'true'
    runs-on: ubuntu-latest
    environment: void
    steps:
      - uses: taiki-e/checkout-action@7d1e50e93dc4fb3bba58f85018fadf77898aee8b # v1.4.2

      - uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1.10.0
        with:
          cache: true

      - name: Deploy to Void
        run: vp run docs:void
        env:
          VOID_TOKEN: ${{ secrets.VOID_TOKEN }}
          VOID_PROJECT: rolldown
