name: Deploy Website

permissions: {}

on:
  pull_request:
    types: [opened, synchronize]
  merge_group:
  push:
    branches:
      - main
    # These inputs can affect the rendered site, so a change here is worth *checking*.
    # Whether we actually deploy is decided by the built-site diff below, not by the path.
    paths:
      - 'docs/**'
      - 'packages/rolldown/src/**'
      - 'packages/rolldown/package.json'
      - 'packages/rolldown/tsconfig*.json'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.ref_name != 'main' }}

jobs:
  # Builds/validates the docs and decides whether the built site changed. Runs untrusted PR code,
  # so it has NO `environment` and NO access to VOID_TOKEN. The deploy is a separate main-only
  # job below.
  docs-validation:
    name: Docs Validation
    runs-on: ubuntu-latest
    outputs:
      deploy: ${{ steps.gate.outputs.deploy }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Full history so vitepress `lastUpdated` resolves from git (not file mtime) and is
          # therefore identical across the two builds we diff. Also gives us the baseline commit.
          fetch-depth: 0
          persist-credentials: false

      - uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1.10.0
        with:
          cache: true

      # Builds the whole site for the current ref. Doubles as the PR validation build.
      - name: Build Docs
        run: |
          vp run --filter rolldown-docs generate
          vp run --filter rolldown-docs build

      - name: Compare built site against baseline
        id: gate
        if: github.event_name != 'merge_group'
        env:
          REF_NAME: ${{ github.ref_name }}
          BASE_REF: ${{ github.base_ref }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -uo pipefail
          # Deploy (main only) when the built site differs from a baseline:
          #   - on main: the previous commit
          #   - on a PR: the target branch (main)
          # The build isn't byte-reproducible (some vitepress plugins emit unstable ordering), so
          # both dists are normalized for comparison via scripts/misc/normalize-docs-dist.mjs. The
          # deploy itself still ships the real, un-normalized build.
          if [ "$REF_NAME" = "main" ]; then
            base="HEAD^"
          else
            base_branch="${BASE_REF:-main}"
            git fetch --no-tags origin "$base_branch" >/dev/null 2>&1 || true
            base="origin/$base_branch"
          fi

          rm -rf "$RUNNER_TEMP/head" "$RUNNER_TEMP/base"
          mv docs/.vitepress/dist "$RUNNER_TEMP/head"

          changed=1 # default to "changed" if the baseline build fails
          diffout='(baseline build failed)'
          if git checkout "$base" -- docs packages/rolldown \
            && vp run --filter rolldown-docs generate \
            && vp run --filter rolldown-docs build; then
            mv docs/.vitepress/dist "$RUNNER_TEMP/base"
            node scripts/misc/normalize-docs-dist.mjs "$RUNNER_TEMP/head"
            node scripts/misc/normalize-docs-dist.mjs "$RUNNER_TEMP/base"
            diffout="$(diff -rq "$RUNNER_TEMP/head" "$RUNNER_TEMP/base" 2>&1 || true)"
            [ -z "$diffout" ] && changed=0
          else
            echo "Could not build the baseline ($base); assuming the site changed."
          fi
          git checkout HEAD -- docs packages/rolldown || true

          deploy=false
          if [ "$changed" -eq 1 ] || [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            deploy=true
          fi
          echo "deploy=$deploy" >> "$GITHUB_OUTPUT"

          if [ "$deploy" = "false" ]; then
            msg="Built docs site unchanged vs \`$base\`."
          else
            msg="Built docs site changed vs \`$base\`."
          fi
          echo "$msg (deploy=$deploy)"
          echo "$msg" >> "$GITHUB_STEP_SUMMARY"

          if [ "$changed" -eq 1 ]; then
            echo "::group::Normalized dist differences (first 80 lines)"
            printf '%s\n' "$diffout" | head -80
            echo "::endgroup::"
          fi

  # Deploy to Void. Isolated, main-only job: the only place VOID_TOKEN is in scope, and it runs
  # only when docs-validation determined the built site changed.
  deploy-void:
    name: Deploy to Void
    needs: [docs-validation]
    if: github.ref_name == 'main' && needs.docs-validation.outputs.deploy == 'true'
    runs-on: ubuntu-latest
    environment: void
    steps:
      - uses: taiki-e/checkout-action@7d1e50e93dc4fb3bba58f85018fadf77898aee8b # v1.4.2

      - uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1.10.0
        with:
          cache: true

      - name: Deploy to Void
        run: vp run docs:void
        env:
          VOID_TOKEN: ${{ secrets.VOID_TOKEN }}
          VOID_PROJECT: rolldown
