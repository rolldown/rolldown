name: Deploy Website

permissions: {}

on:
  pull_request:
    types: [opened, synchronize]
  merge_group:
  push:
    branches:
      - main
    # These inputs can affect the rendered site, so a change here is worth *checking*.
    # Whether we actually deploy is decided by the built-output diff below, not by the path.
    paths:
      - 'docs/**'
      - 'packages/rolldown/src/**'
      - 'packages/rolldown/package.json'
      - 'packages/rolldown/tsconfig*.json'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.ref_name != 'main' }}

jobs:
  # Builds/validates the docs and decides whether the rendered site changed. Runs untrusted PR
  # code, so it has NO `environment` and NO access to VOID_TOKEN. The deploy is a separate
  # main-only job below.
  docs-validation:
    name: Docs Validation
    runs-on: ubuntu-latest
    outputs:
      deploy: ${{ steps.gate.outputs.deploy }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2 # need the previous commit on main; the PR baseline is fetched below
          persist-credentials: false

      - uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1.10.0
        with:
          cache: true

      # Builds the whole site for the current ref. Doubles as the PR validation build.
      - name: Build Docs
        run: |
          vp run --filter rolldown-docs generate
          vp run --filter rolldown-docs build

      - name: Compare built site against baseline
        id: gate
        if: github.event_name != 'merge_group'
        run: |
          set -uo pipefail
          # Compare the freshly built site against a baseline:
          #   - on main: the previous commit
          #   - on a PR: the target branch (main)
          # and deploy (main only) when it differs. The build is reproducible — the only
          # non-deterministic outputs are the generated llms*.txt aggregations, which the diff
          # excludes (real content changes still show up in the HTML), so a packages/rolldown/src
          # change that doesn't alter the rendered site produces an identical dist and is skipped.
          if [ "${{ github.ref_name }}" = "main" ]; then
            base="HEAD^"
          else
            base_branch="${{ github.base_ref || 'main' }}"
            git fetch --no-tags --depth=1 origin "$base_branch" >/dev/null 2>&1 || true
            base="origin/$base_branch"
          fi

          mv docs/.vitepress/dist /tmp/dist-head
          changed=1 # default to "changed" if the baseline build fails
          if git checkout "$base" -- docs packages/rolldown \
            && vp run --filter rolldown-docs generate \
            && vp run --filter rolldown-docs build; then
            mv docs/.vitepress/dist /tmp/dist-base
            if diff -rq -x 'llms.txt' -x 'llms-full.txt' /tmp/dist-head /tmp/dist-base >/dev/null 2>&1; then
              changed=0
            fi
          else
            echo "Could not build baseline ($base); assuming the site changed."
          fi
          git checkout HEAD -- docs packages/rolldown || true

          deploy=false
          if [ "$changed" -eq 1 ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            deploy=true
          fi
          echo "deploy=$deploy" >> "$GITHUB_OUTPUT"

          if [ "$changed" -eq 0 ]; then
            msg="Docs site unchanged vs \`$base\`."
          else
            msg="Docs site changed vs \`$base\`."
          fi
          echo "$msg (deploy=$deploy)"
          echo "$msg" >> "$GITHUB_STEP_SUMMARY"

  # Deploy to Void. Isolated, main-only job: the only place VOID_TOKEN is in scope, and it runs
  # only when docs-validation determined the built site changed.
  deploy-void:
    name: Deploy to Void
    needs: [docs-validation]
    if: github.ref_name == 'main' && needs.docs-validation.outputs.deploy == 'true'
    runs-on: ubuntu-latest
    environment: void
    steps:
      - uses: taiki-e/checkout-action@7d1e50e93dc4fb3bba58f85018fadf77898aee8b # v1.4.2

      - uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1.10.0
        with:
          cache: true

      - name: Deploy to Void
        run: vp run docs:void
        env:
          VOID_TOKEN: ${{ secrets.VOID_TOKEN }}
          VOID_PROJECT: rolldown
