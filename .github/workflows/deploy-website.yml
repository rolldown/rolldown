name: Deploy Website

permissions: {}

on:
  pull_request:
    types: [opened, synchronize]
  merge_group:
  push:
    branches:
      - main
    # These inputs can affect the rendered site, so a change here is worth *checking*.
    # Whether we actually deploy is decided by the content fingerprint below, not by the path.
    paths:
      - 'docs/**'
      - 'packages/rolldown/src/**'
      - 'packages/rolldown/package.json'
      - 'packages/rolldown/tsconfig*.json'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.ref_name != 'main' }}

jobs:
  # Validates the docs on every PR/merge-queue run, and additionally deploys to Void on main.
  # The deploy steps are gated to `main`, so VOID_TOKEN is only ever used there.
  docs-validation:
    name: Docs Validation
    runs-on: ubuntu-latest
    environment: void
    steps:
      - uses: taiki-e/checkout-action@7d1e50e93dc4fb3bba58f85018fadf77898aee8b # v1.4.2

      - uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1.10.0
        with:
          cache: true

      # Always run: the generated API reference is the input to both the validation build and
      # the content fingerprint. On main the deploy step builds the site, so the standalone
      # validation build below is skipped there to avoid building twice.
      - name: Generate API reference
        run: vp run --filter rolldown-docs generate

      - name: Build Docs
        if: github.ref_name != 'main'
        run: vp run --filter rolldown-docs build

      - name: Fingerprint docs content
        id: fingerprint
        run: |
          set -euo pipefail
          # Hash the deployable *content*: git-tracked docs sources (pages, theme, .vitepress
          # config, the generator script) plus the generated API reference under docs/reference.
          # Build output (dist), the vitepress cache and deps are excluded, so the hash is stable
          # and independent of lastUpdated/sitemap/OG-image artifacts. API/exports/tsconfig
          # changes are captured indirectly via the regenerated reference; a packages/rolldown/src
          # change that leaves the public API untouched yields the same hash and so no deploy.
          hash="$(
            {
              git ls-files -z -- docs
              find docs/reference -type f -print0
            } | LC_ALL=C sort -zu | xargs -0 sha256sum | sha256sum
          )"
          hash="${hash%% *}"
          echo "hash=$hash" >> "$GITHUB_OUTPUT"
          echo "Docs content fingerprint: $hash"

      # --- Deploy (main only) -------------------------------------------------------------
      - name: Was this content already deployed?
        id: deployed
        if: github.ref_name == 'main'
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .docs-deploy-marker
          key: docs-deploy-${{ steps.fingerprint.outputs.hash }}
          lookup-only: true

      - name: Decide whether to deploy
        id: gate
        if: github.ref_name == 'main'
        run: |
          # Deploy when the content changed (cache miss) or when manually dispatched (force).
          if [ "${{ steps.deployed.outputs.cache-hit }}" = "true" ] && [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            echo "deploy=false" >> "$GITHUB_OUTPUT"
            echo "Docs content unchanged — fingerprint ${{ steps.fingerprint.outputs.hash }} already deployed; skipping."
          else
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to Void
        if: steps.gate.outputs.deploy == 'true'
        run: vp run --filter rolldown-docs void deploy
        env:
          VOID_TOKEN: ${{ secrets.VOID_TOKEN }}
          VOID_PROJECT: rolldown

      - name: Record deployed fingerprint
        if: steps.gate.outputs.deploy == 'true'
        run: echo "${{ steps.fingerprint.outputs.hash }}" > .docs-deploy-marker

      - name: Save deploy marker
        if: steps.gate.outputs.deploy == 'true'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .docs-deploy-marker
          key: docs-deploy-${{ steps.fingerprint.outputs.hash }}
