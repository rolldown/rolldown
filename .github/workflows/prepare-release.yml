name: Prepare Release

permissions: {}

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'New version (e.g. 1.0.1)'
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Prepare Release
    if: github.repository == 'rolldown/rolldown'
    runs-on: ubuntu-latest
    permissions:
      contents: write # for create-pull-request
      pull-requests: write # for create-pull-request
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # for changelog
          persist-credentials: true # for create-pull-request

      - uses: taiki-e/install-action@cde8c9e634f4a17bc06b61413ac0ef75450eac46 # v2.81.4
        with:
          tool: just

      - uses: voidzero-dev/setup-vp@2dec1e33f4ab2c6d5bce1b0c4607961bb1a3f7a1 # v1.12.0
        with:
          cache: true

      - uses: oxc-project/setup-rust@3d6fb132fbe7cdcb66bf8ec193911c2945369d12 # v1.0.17
        with:
          cache-key: warm
          tools: cargo-release-oxc

      - name: Set version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: echo "VERSION=$INPUT_VERSION" >> "$GITHUB_ENV"

      - name: Bump crate versions
        run: |
          mkdir -p target
          cargo release-oxc update --release crates --version ${VERSION}

      - name: Update Cargo.lock after crate bump
        run: cargo check

      - run: just bump-packages ${VERSION}

      - name: Regenerate binding.js after version bump
        run: vp run --filter rolldown build-binding

      - name: Generate changelog via git cliff
        id: changelog
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4.8.0
        env:
          # Used to make request to GitHub without ratelimits.
          # `secrets.GIT_CLIFF_TOKEN` only has read permission.
          GITHUB_TOKEN: ${{ secrets.GIT_CLIFF_TOKEN }}
        with:
          version: v2.9.1 # git cliff version
          config: cliff.toml
          args: --unreleased --prepend CHANGELOG.md --tag ${{ env.VERSION }}

      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        if: ${{ steps.changelog.outputs.content }}
        with:
          token: ${{ steps.app-token.outputs.token }}
          add-paths: |
            CHANGELOG.md
            packages/**/package.json
            packages/rolldown/src/binding.cjs
            Cargo.toml
            Cargo.lock
            crates/**/Cargo.toml
          commit-message: 'release: v${{ env.VERSION }}'
          body: ${{ steps.changelog.outputs.content }}
          branch: release-v${{ env.VERSION }}
          branch-suffix: timestamp
          base: main
          title: 'release: v${{ env.VERSION }}'
          assignees: Boshen, shulaoda
