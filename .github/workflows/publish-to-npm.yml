name: Publish to NPM

permissions: {}

on:
  push:
    branches:
      - main
    paths:
      - packages/rolldown/package.json

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check version
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.version.outputs.changed }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: taiki-e/checkout-action@7d1e50e93dc4fb3bba58f85018fadf77898aee8b # v1.4.2

      - name: Check version changes
        uses: EndBug/version-check@095362f3cd50f690c8fa0e6afeea81834bd8d320 # v3.0.0
        id: version
        with:
          static-checking: localIsNew
          file-url: https://unpkg.com/rolldown@latest/package.json
          file-name: packages/rolldown/package.json

      - name: Print version
        if: steps.version.outputs.changed == 'true'
        env:
          NEW_VERSION: ${{ steps.version.outputs.version }}
        run: |
          echo "Version change found! New version: ${NEW_VERSION}"

  build:
    needs: check
    if: needs.check.outputs.version_changed == 'true'
    name: Build bindings and node packages
    uses: ./.github/workflows/reusable-release-build.yml

  notify-before-publish:
    needs: [check, build]
    if: github.repository == 'rolldown/rolldown'
    name: Notify Before Publish
    runs-on: ubuntu-latest
    steps:
      - name: Notify Discord
        uses: tsickert/discord-webhook@b217a69502f52803de774ded2b1ab7c282e99645 # v7.0.0
        with:
          webhook-url: ${{ secrets.DISCORD_ROLLDOWN_CHANNEL }}
          embed-title: Rolldown Release
          embed-description: Requesting approval for Rolldown v${{ needs.check.outputs.version }}.
          embed-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  publish:
    needs: [build, notify-before-publish]
    if: github.repository == 'rolldown/rolldown'
    name: Publish npm Packages
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write # for `npm publish --provenance`
    steps:
      - uses: taiki-e/checkout-action@7d1e50e93dc4fb3bba58f85018fadf77898aee8b # v1.4.2

      - uses: voidzero-dev/setup-vp@4f5aa3e38c781f1b01e78fb9255527cee8a6efa6 # v1.8.0
        with:
          cache: true

      - name: Git Reset Hard
        run: git reset --hard # fix pnpm install add new line for package.json

      - name: Download Binding Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: packages/rolldown/artifacts

      - name: Create rolldown/npm dirs
        run: vp exec --filter rolldown napi create-npm-dirs

      - name: Move Binding Artifacts
        run: vp run --filter rolldown artifacts

      - name: List Rolldown Bindings
        run: ls -R ./packages/rolldown/npm
        shell: bash

      - name: Check wasm32-wasi binding deps match @rolldown/browser
        run: node scripts/misc/check-wasi-binding-deps.mjs

      - name: Download Node Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: packages/rolldown/dist
          name: node-artifact

      - name: Download `@rolldown/browser` Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: packages/browser/dist
          name: browser-artifact

      - name: Download `@rolldown/debug` Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: packages/debug/dist
          name: debug-artifact

      - name: Download Pluginutils Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: packages/pluginutils/dist
          name: pluginutils-artifact

      - name: Copy Licenses
        run: |
          find ./packages/ -type d -maxdepth 1 -exec cp LICENSE {} \;
          find ./packages/ -type d -maxdepth 1 -exec cp THIRD-PARTY-LICENSE {} \;

      - name: Publish(Dry Run)
        run: |
          vp pm publish -r --tag latest --dry-run --no-git-checks

      - name: Publish
        run: |
          npm install -g npm
          vp pm publish -r --tag latest --no-git-checks

  release:
    needs: [check, publish]
    if: github.repository == 'rolldown/rolldown'
    name: GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # for softprops/action-gh-release@v1
    steps:
      - uses: taiki-e/checkout-action@7d1e50e93dc4fb3bba58f85018fadf77898aee8b # v1.4.2

      - name: Get changelog from commit body
        id: changelog
        run: |
          {
            echo 'CHANGELOG<<EOF'
            git show -s --format=%b
            echo EOF
          } >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        id: github_release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          draft: false
          tag_name: v${{ needs.check.outputs.version }} # tags the current commit
          target_commitish: ${{ github.sha }}
          body: ${{ steps.changelog.outputs.CHANGELOG }}

      - name: Notify Discord
        uses: tsickert/discord-webhook@b217a69502f52803de774ded2b1ab7c282e99645 # v7.0.0
        with:
          webhook-url: ${{ secrets.DISCORD_ROLLDOWN_CHANNEL }}
          embed-title: Rolldown Release
          embed-description: Released v${{ needs.check.outputs.version }}.
          embed-url: ${{ steps.github_release.outputs.url }}
