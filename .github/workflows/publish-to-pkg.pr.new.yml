name: Publish to pkg.pr.new
description: https://pkg.pr.new/~/rolldown/rolldown

permissions: {}

on:
  workflow_dispatch:
  pull_request:
    types: [labeled]
  push:
    branches:
      - main
    paths:
      - 'crates/**'
      - 'packages/**'
      - 'patches/@napi-rs__cli@3.7.2.patch'
      - 'scripts/misc/check-wasi-binding-deps.mjs'
      - 'scripts/misc/check-wasi-binding-packed-consumer.mjs'
      - 'scripts/misc/stage-wasi-packages.mjs'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/publish-to-pkg.pr.new.yml'

# Cancell all previous workflows on main.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

jobs:
  debounce:
    runs-on: ubuntu-latest
    steps:
      # Remove ❌ from main branch.
      - uses: MercuryTechnologies/delete-cancelled-runs@f5c9d322d9c7afbd41f779199818c1ffe381d34b # 1.0.0
        if: github.repository == 'rolldown/rolldown' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          workflow-file: 'publish-to-pkg.pr.new.yml'

      - name: Debounce for 20 mins
        if: github.repository == 'rolldown/rolldown' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        # sleep for 20mins, which should be 1.5 times larger than time for https://github.com/rolldown/rolldown/queue/main.
        run: |
          echo "Start debounce wait: $(date)"
          sleep 1200
          echo "End debounce wait: $(date)"

  build:
    if: >
      github.repository == 'rolldown/rolldown' &&
      (github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'trigger: preview')))
    name: Build bindings and node packages
    uses: ./.github/workflows/reusable-release-build.yml
    needs:
      - debounce
    with:
      version: 'commit'

  publish:
    if: >
      github.repository == 'rolldown/rolldown' &&
      (github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'trigger: preview')))
    name: Pkg Preview
    runs-on: ubuntu-latest
    needs:
      - debounce
      - build
    steps:
      - uses: taiki-e/checkout-action@7d1e50e93dc4fb3bba58f85018fadf77898aee8b # v1.4.2

      - uses: voidzero-dev/setup-vp@35171c92dd08b67d5a9d3f2a4327800e58396f2a # v1.13.0
        with:
          version: '0.2.1'
          cache: true

      - name: Git Reset Hard
        run: git reset --hard # fix pnpm install add new line for package.json

      - name: Download Binding Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: packages/rolldown/artifacts
          pattern: bindings-*

      - name: Create rolldown/npm dirs
        run: vp exec --filter rolldown napi create-npm-dirs

      - name: Move Binding Artifacts
        run: vp run --filter rolldown artifacts

      - name: List Rolldown Bindings
        run: ls -R ./packages/rolldown/npm
        shell: bash

      - name: Download Node Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: packages/rolldown/dist
          name: node-artifact

      - name: Download `@rolldown/browser` Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: packages/browser/dist
          name: browser-artifact

      - name: Download bundled threaded WASI loaders
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: packages/rolldown/artifacts/threaded-wasi-loaders
          name: threaded-wasi-loader-artifact

      - name: Vendor WASI runtimes
        run: node scripts/misc/stage-wasi-packages.mjs

      - name: Check WASI binding runtime dependencies
        run: node scripts/misc/check-wasi-binding-deps.mjs

      - name: Install Node 20 for packed consumer validation
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20.19.0'

      - name: Capture Node 20 executable
        run: echo "ROLLDOWN_NODE20_EXECUTABLE=$(command -v node)" >> "$GITHUB_ENV"

      - name: Restore tooling Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Download `rolldown-version.txt`
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: rolldown-version

      - name: Canary/Nightly Versioning
        run: |
          ROLLDOWN_VERSION=$(cat rolldown-version.txt)
          node --import @oxc-node/core/register ./scripts/misc/bump-version.js ${ROLLDOWN_VERSION}

      - name: Install Chromium for packed WASI browser validation
        run: vp exec playwright install chromium

      - name: Test packed WASI consumers
        run: node scripts/misc/check-wasi-binding-packed-consumer.mjs
        env:
          NAPI_RS_ENFORCE_VERSION_CHECK: '1'

      - name: Download `@rolldown/debug` Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: packages/debug/dist
          name: debug-artifact

      - name: Prepare Release Packages
        run: vp run --filter rolldown prepublishOnly --skip-optional-publish

      - name: Copy Licenses
        run: |
          find ./packages/ -type d -maxdepth 1 -exec cp LICENSE {} \;
          find ./packages/ -type d -maxdepth 1 -exec cp THIRD-PARTY-LICENSE {} \;

      - name: Release
        run: vpx pkg-pr-new publish --compact --pnpm './packages/rolldown/npm/*' './packages/rolldown' './packages/browser' './packages/debug' --packageManager=pnpm,npm,yarn --commentWithDev
