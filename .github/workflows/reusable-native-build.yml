name: Reusable Rolldown Native Build

permissions: {}

on:
  workflow_call:
    inputs:
      changed:
        required: true
        type: boolean
      os:
        required: true
        type: string

jobs:
  run:
    name: Build Rolldown Native
    runs-on: ${{ inputs.os }}
    timeout-minutes: 15
    steps:
      - name: Skip native build when no node changes
        if: ${{ !inputs.changed }}
        run: echo "No Node.js changes detected; skipping native build."

      - uses: taiki-e/checkout-action@3ab630d442e198ebb0ca30872832406ca01c46eb # v1.4.0
        if: ${{ inputs.changed }}

      - uses: samypr100/setup-dev-drive@30f0f98ae5636b2b6501e181dfb3631b9974818d # v4.0.0
        if: ${{ inputs.changed && runner.os == 'Windows' }}
        with:
          drive-size: 12GB
          drive-format: ReFS
          env-mapping: |
            CARGO_HOME,{{ DEV_DRIVE }}/.cargo
            RUSTUP_HOME,{{ DEV_DRIVE }}/.rustup
            PNPM_HOME,{{ DEV_DRIVE }}/.pnpm

      - name: Setup Rust
        uses: oxc-project/setup-rust@4f86b5d871ae7d24bc420e578be68964ab09e5cc # v1.0.15
        if: ${{ inputs.changed }}
        with:
          tools: just
          cache-key: native-build
          save-cache: ${{ github.ref_name == 'main' }}
          target-dir: ${{ runner.os == 'Windows' && format('{0}/target', env.DEV_DRIVE) || '' }}

      - uses: oxc-project/setup-node@8958a8e040102244b619c4a94fccb657a44b1c21 # v1.0.6
        if: ${{ inputs.changed }}

      - name: Build Native Rolldown
        if: ${{ inputs.changed }}
        run: just build-rolldown

      - name: Check no diff
        if: ${{ inputs.changed }}
        run: git diff --exit-code

      - name: Upload Rolldown Native
        if: ${{ inputs.changed }}
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: rolldown-native-${{ inputs.os }}
          path: |
            packages/rolldown/dist
            packages/pluginutils/dist
          if-no-files-found: error
