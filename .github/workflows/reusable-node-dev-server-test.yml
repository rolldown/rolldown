name: Node Dev Server Test

permissions: {}

on:
  workflow_call:
    inputs:
      os:
        required: true
        type: string
      changed:
        required: true
        type: boolean
      node-version:
        required: true
        type: number

jobs:
  run:
    name: Node Dev Server Test
    if: ${{ inputs.changed }}
    runs-on: ${{ inputs.os == 'ubuntu-latest' && 'namespace-profile-linux-x64-default' || inputs.os == 'macos-latest' && 'namespace-profile-mac-default' || inputs.os }}
    timeout-minutes: 15
    steps:
      - uses: taiki-e/checkout-action@7d1e50e93dc4fb3bba58f85018fadf77898aee8b # v1.4.2

      # pnpm v11 requires Node >=22.13, so fall back to pnpm 10 when testing on Node 20.
      - name: Pin pnpm 10 for Node 20
        if: ${{ inputs.node-version == 20 }}
        run: npm pkg set packageManager=pnpm@10.33.4

      - uses: voidzero-dev/setup-vp@250f29ce396baf5e8f24498e17c0dfdebabc26eb # v1.15.0
        with:
          version: '0.2.1'
          node-version: ${{ inputs.node-version }}
          cache: true

      - name: Download Native Rolldown Build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: rolldown-native-${{ inputs.os }}
          path: packages/rolldown/dist

      - name: Build `@rolldown/test-dev-server`
        run: vp run --filter '@rolldown/test-dev-server' build

      # The rebase in setup-vite needs a committer identity.
      - name: Configure Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      # The browser-platform tests run on Vite's full bundle mode, served from
      # a clone of vitejs/vite at the latest rolldown-canary rebased onto the
      # latest main (kept unpatched, no rolldown-side edits). setup-vite
      # creates the checkout, installs its pinned deps, builds vite, and
      # points its runtime `rolldown` resolution at packages/rolldown.
      - name: Setup Vite checkout (browser-platform backend)
        run: vp run --filter '@rolldown-internal/scripts' setup-vite

      - name: Install Playwright
        run: vp exec playwright install chromium

      - name: Dev Server Test
        run: vp run --filter '@rolldown/test-dev-server-tests' test
