name: WASI Test

permissions: {}

on:
  workflow_call:
    inputs:
      changed:
        required: true
        type: boolean

jobs:
  run:
    name: WASI Test
    if: ${{ inputs.changed }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true # rollup-tests needs the rollup submodule
          persist-credentials: false

      - uses: voidzero-dev/setup-vp@56918a6d0c629c55ae8b88826a7d47fda85769ee # v1.9.0
        with:
          cache: true

      - name: Download Rolldown with WASI Binding
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: rolldown-wasi
          path: packages/rolldown/dist

      - name: Build `@rolldown/test-dev-server`
        run: vp run --filter '@rolldown/test-dev-server' build

      # NAPI_RS_FORCE_WASI is intentionally NOT set: the workspace's WASI build of rolldown
      # has no native fallback (its `dist/index.mjs` imports `rolldown-binding.wasi.cjs`
      # directly — see `resolveWasiBinding` in `packages/rolldown/build.ts`), so tests against
      # the workspace rolldown always exercise WASI. Setting `NAPI_RS_FORCE_WASI` would force
      # the transitive `rolldown@<rc>` (pulled in by vitest/vite-plus) to also load WASI, which
      # fails because its WASI binding (`@rolldown/binding-wasm32-wasi`) is filtered by pnpm
      # on linux-x64 hosts.
      - name: Node Test
        run: vp run --filter rolldown-tests test:main && vp run --filter rolldown-tests test:watcher && vp run --filter rolldown-tests test:stability

      - name: Rollup Test
        run: vp run --filter rollup-tests test

      # `@example/typescript` is excluded because its config enables `devtools`, which
      # currently panics under WASI when the writer tries to open its log file (see
      # `crates/rolldown_devtools/src/writer.rs`). Tracked as a follow-up to issue #8579.
      - name: Build Examples
        run: vp run --filter '@example/*' --filter '!@example/native-magic-string' --filter '!@example/typescript' build
