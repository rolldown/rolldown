name: WASI Test

permissions: {}

on:
  workflow_call:
    inputs:
      changed:
        required: true
        type: boolean

jobs:
  run:
    name: WASI Test
    if: ${{ inputs.changed }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: taiki-e/checkout-action@7d1e50e93dc4fb3bba58f85018fadf77898aee8b # v1.4.2

      - uses: voidzero-dev/setup-vp@56918a6d0c629c55ae8b88826a7d47fda85769ee # v1.9.0
        with:
          cache: true

      - name: Download Rolldown with WASI Binding
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: rolldown-wasi
          path: packages/rolldown/dist

      - name: Build `@rolldown/test-dev-server`
        run: vp run --filter '@rolldown/test-dev-server' build

      - name: Node Test
        run: |
          vp run --filter rolldown-tests test:main && vp run --filter rolldown-tests test:watcher && vp run --filter rolldown-tests test:stability
        env:
          NAPI_RS_FORCE_WASI: error
          RD_LOG: trace

      - name: Rollup Test
        run: vp run --filter rollup-tests test
        env:
          NAPI_RS_FORCE_WASI: error
          RD_LOG: trace

      - name: Build Examples
        run: vp run --filter '@example/**' --filter '!@example/native-magic-string' build
        env:
          NAPI_RS_FORCE_WASI: error
