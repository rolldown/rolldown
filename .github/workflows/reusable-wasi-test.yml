name: WASI Test

permissions: {}

on:
  workflow_call:
    inputs:
      changed:
        required: true
        type: boolean

jobs:
  run:
    name: WASI Test
    if: ${{ inputs.changed }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: taiki-e/checkout-action@7d1e50e93dc4fb3bba58f85018fadf77898aee8b # v1.4.2

      # NAPI_RS_FORCE_WASI is process-wide, so the transitive rolldown@1.0.0-rc.18 (pulled in by
      # vitest/vite-plus) also tries to load its WASI binding at test time. Its
      # @rolldown/binding-wasm32-wasi optional dep is filtered out by pnpm on linux-x64 hosts;
      # configure supported-architectures BEFORE setup-vp's install runs so it's not skipped.
      - name: Configure pnpm for WASI optional dependencies
        run: |
          {
            echo "supported-architectures.cpu[]=current"
            echo "supported-architectures.cpu[]=wasm32"
            echo "supported-architectures.os[]=current"
            echo "supported-architectures.os[]=wasi"
          } >> .npmrc

      - uses: voidzero-dev/setup-vp@56918a6d0c629c55ae8b88826a7d47fda85769ee # v1.9.0
        with:
          cache: true

      # setup-vp bundles pnpm internally but does not expose it on PATH;
      # corepack activates the version declared in package.json's `packageManager` field.
      # `sudo` is required to write shims into /usr/local/bin (same pattern as
      # reusable-release-build.yml:164).
      - name: Enable corepack
        run: sudo corepack enable

      - name: Download Rolldown with WASI Binding
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: rolldown-wasi
          path: packages/rolldown/dist

      - name: Build `@rolldown/test-dev-server`
        run: vp run --filter '@rolldown/test-dev-server' build

      # Note: these steps use `pnpm` rather than `vp` because `vp` itself is a napi-rs binary
      # and its loader respects NAPI_RS_FORCE_WASI — setting it at the step level would break
      # vp at startup before it could spawn the test runner.
      - name: Node Test
        run: |
          pnpm --filter rolldown-tests run test:main && pnpm --filter rolldown-tests run test:watcher && pnpm --filter rolldown-tests run test:stability
        env:
          NAPI_RS_FORCE_WASI: error
          RD_LOG: trace

      - name: Rollup Test
        run: pnpm --filter rollup-tests run test
        env:
          NAPI_RS_FORCE_WASI: error
          RD_LOG: trace

      - name: Build Examples
        run: pnpm --filter '@example/*' --filter '!@example/native-magic-string' --sequential run build
        env:
          NAPI_RS_FORCE_WASI: error
