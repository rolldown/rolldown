name: WASI

permissions: {}

on:
  workflow_call:
    inputs:
      changed:
        required: true
        type: boolean

jobs:
  run:
    name: WASI
    if: ${{ inputs.changed }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: oxc-project/setup-rust@3d6fb132fbe7cdcb66bf8ec193911c2945369d12 # v1.0.17
        with:
          tools: just
          cache-key: debug-build-wasi
          save-cache: ${{ github.ref_name == 'main' }}

      - uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1.10.0
        with:
          cache: true

      - name: Add WASI target
        run: rustup target add wasm32-wasip1-threads

      - name: Build Rolldown with WASI Binding
        run: just build-rolldown-wasi

      - name: Stability Test
        run: vp run --filter rolldown-tests test:stability

      # `@example/typescript` is excluded because its config enables `devtools`, which currently
      # panics under WASI when the writer tries to open its log file (crates/rolldown_devtools/src/writer.rs).
      # `@example/native-magic-string` is excluded because it depends on a native-only addon.
      - name: Build Examples
        run: vp run --filter '@example/*' --filter '!@example/native-magic-string' --filter '!@example/typescript' build
