name: WASI

permissions: {}

on:
  workflow_call:
    inputs:
      changed:
        required: true
        type: boolean

jobs:
  run:
    name: WASI
    if: ${{ inputs.changed }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: oxc-project/setup-rust@3d6fb132fbe7cdcb66bf8ec193911c2945369d12 # v1.0.17
        with:
          tools: just
          cache-key: debug-build-wasi
          save-cache: ${{ github.ref_name == 'main' }}

      - uses: voidzero-dev/setup-vp@35171c92dd08b67d5a9d3f2a4327800e58396f2a # v1.13.0
        with:
          version: '0.2.1'
          cache: true

      - name: Add WASI targets
        run: rustup target add wasm32-wasip1 wasm32-wasip1-threads

      - name: Check shared runtime on threadless WASI
        run: |
          emnapi_package_dir="$(
            cd packages/rolldown
            node - <<'NODE'
          const { createRequire } = require('node:module')
          const { dirname } = require('node:path')
          const cliRequire = createRequire(require.resolve('@napi-rs/cli/package.json'))
          console.log(dirname(cliRequire.resolve('emnapi/package.json')))
          NODE
          )"
          RUSTC="$(rustup which rustc)" \
            EMNAPI_LINK_DIR="$emnapi_package_dir/lib/wasm32-wasip1" \
            cargo check -p rolldown_binding --target wasm32-wasip1 \
              --no-default-features --features async-runtime --locked
          RUSTC="$(rustup which rustc)" \
            EMNAPI_LINK_DIR="$emnapi_package_dir/lib/wasm32-wasip1" \
            cargo check -p rolldown_binding --target wasm32-wasip1 \
              --features async-runtime --locked

      - name: Reject Tokio runtime on threadless WASI
        run: |
          emnapi_package_dir="$(
            cd packages/rolldown
            node - <<'NODE'
          const { createRequire } = require('node:module')
          const { dirname } = require('node:path')
          const cliRequire = createRequire(require.resolve('@napi-rs/cli/package.json'))
          console.log(dirname(cliRequire.resolve('emnapi/package.json')))
          NODE
          )"
          if output="$(
            RUSTC="$(rustup which rustc)" \
              EMNAPI_LINK_DIR="$emnapi_package_dir/lib/wasm32-wasip1" \
              cargo check -p rolldown_binding --target wasm32-wasip1 --locked 2>&1
          )"; then
            echo "Expected the Tokio/threadless-WASI build to be rejected"
            exit 1
          fi
          printf '%s\n' "$output"
          grep -F "wasm32-wasip1 requires Rolldown's \`async-runtime\` feature" <<<"$output"

      - name: Check shared runtime on threaded WASI
        run: |
          emnapi_package_dir="$(
            cd packages/rolldown
            node - <<'NODE'
          const { createRequire } = require('node:module')
          const { dirname } = require('node:path')
          const cliRequire = createRequire(require.resolve('@napi-rs/cli/package.json'))
          console.log(dirname(cliRequire.resolve('emnapi/package.json')))
          NODE
          )"
          RUSTC="$(rustup which rustc)" \
            EMNAPI_LINK_DIR="$emnapi_package_dir/lib/wasm32-wasip1-threads" \
            cargo check -p rolldown_binding --target wasm32-wasip1-threads \
              --no-default-features --features async-runtime --locked

      - name: Build Rolldown with WASI Binding
        run: just build-rolldown-wasi

      - name: Stability Test
        run: vp run --filter rolldown-tests test:stability

      - name: Threaded WASI Runtime Lifecycle Test
        run: vp run --filter rolldown-tests test:wasi-runtime-lifecycle

      # `@example/typescript` is excluded because its config enables `devtools`, which currently
      # panics under WASI when the writer tries to open its log file (crates/rolldown_devtools/src/writer.rs).
      # `@example/native-magic-string` is excluded because it depends on a native-only addon.
      - name: Build Examples
        run: vp run --filter '@example/*' --filter '!@example/native-magic-string' --filter '!@example/typescript' build
