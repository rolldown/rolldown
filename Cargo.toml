#
anyhow = "1.0.103"
append-only-vec = "0.1.8"
arcstr = { version = "1.2.0", default-features = false }
ariadne = { package = "rolldown-ariadne", version = "0.6.0" }
async-channel = "2.5.0"
async-scoped = "0.9.0"
base-encode = "0.3.1"
base64-simd = "0.8.0"
bitflags = "2.13.0"
blake3 = "1.8.5"
cow-utils = "0.1.3"
criterion2 = { version = "3.0.4", default-features = false }
dashmap = "6.2.1"
derive_more = { version = "2.1.1", features = ["debug"] }
dunce = "1.0.5" # Normalize Windows paths to the most compatible format, avoiding UNC where possible
fast-glob = "1.0.1"
flate2 = { version = "=1.1.9", features = ["zlib-rs"] }
form_urlencoded = "1.2.2"
futures = "0.3.32"
glob = "0.3.3"
heck = "0.5.0"
# Pinned to the no-ICU 1.0.0 backend to keep IDNA support turned off.
# See crates/rolldown_plugin_vite_resolve/Cargo.toml for the full rationale.
idna_adapter = "=1.0.0"
ignore = "0.4.27"
indexmap = "2.14.0"
infer = { version = "0.22.0", default-features = false }
insta = "1.48.0"
itertools = "0.15.0"
itoa = "1.0.18"
json-escape-simd = "3.1.1"
json-strip-comments = "3"
jsonschema = { version = "0.48.0", default-features = false }
memchr = "2.8.2"
mimalloc-safe = "0.1.64"
mime = "0.3.17"
nodejs-built-in-modules = "1.0.0"
nom = "8.0.0"
num-bigint = "0.5.1"
num_cpus = "1.17"
owo-colors = "4.3.0"
parking_lot = "0.12.5"
path-posix = "0.0.1"
percent-encoding = "2.3.2"
petgraph = "0.8.3"
phf = { version = "0.14.0", features = ["macros"] }
pnp = "0.12.10"
rayon = "1.12.0"
# Default features drop the `\p{…}` Unicode property tables (gencat/script/age/bool/segment),
# which no hardcoded pattern uses. `unicode-perl`/`unicode-case` are kept so `\w \d \s \b` and
# `(?i)` stay Unicode-aware. User patterns needing `\p{…}` fall back to `regress` via `HybridRegex`.
regex = { version = "1.13.0", default-features = false, features = [
  "std",
  "perf",
  "unicode-perl",
  "unicode-case",
] }
regress = "0.11.1"
rolldown-notify = "10.5.0"
rolldown-notify-debouncer-full = "0.7.9"
rustc-hash = { version = "2.1.3" }
schemars = "1.2.1"
self_cell = "1.2.2"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
serde_yaml = "0.9.34"
simdutf8 = "0.1.5"
smallvec = { version = "1.15.2", features = ["union"] }
sugar_path = { version = "3", features = ["cached_current_dir"] }
supports-color = "3"
terminal_size = "0.4.4"
testing_macros = "1.0.1"
tokio = { version = "1.52.3", default-features = false }
tracing = "0.1.44"
tracing-chrome = "0.7.2"
tracing-subscriber = { version = "0.3.23", default-features = false }
ts-rs = "12.0"
typedmap = "0.6.0"
url = "2.5.8"
uuid = "1.23.4"
vfs = "0.13.0"
walkdir = "2.5.0"
xxhash-rust = "0.8.16"

prettyplease = "0.3.0"
proc-macro2 = "1"
quote = "1"
syn = { version = "3", default-features = false }

# napi
# Keep the `tracing` feature on: `#[napi]` logs every binding call, which helps debug deadlocks
# (e.g. #7289) by showing which napi function is pending.
napi = { version = "3", features = ["async", "anyhow", "tracing", "object_indexmap"] }
napi-build = { version = "2" }
napi-derive = { version = "3", default-features = false, features = ["type-def", "tracing"] }

# oxc crates with the same version
oxc = { version = "0.141.0", features = [
  "ast_visit",
  "transformer",
  "minifier",
  "mangler",
  "semantic",
  "codegen",
  "serialize",
  "isolated_declarations",
  "regular_expression",
] }
oxc_allocator = { version = "0.141.0", features = ["pool"] }
# Depended on directly only to enable `disable_old_builder` (removes oxc's deprecated
# old AstBuilder API); the `oxc` umbrella crate has no passthrough feature for it.
oxc_ast = { version = "0.141.0", features = ["disable_old_builder"] }
oxc_ecmascript = { version = "0.141.0" }
oxc_napi = { version = "0.141.0" }
oxc_str = { version = "0.141.0" }
oxc_minify_napi = { version = "0.141.0" }
oxc_parser_napi = { version = "0.141.0" }
oxc_transform_napi = { version = "0.141.0" }
oxc_traverse = { version = "0.141.0" }

# oxc crates in their own repos
# Versions must be relaxed for usage in oxc.
# Please update with `cargo update oxc_resolver oxc_resolver_napi oxc_sourcemap oxc_index oxc-browserslist`
oxc_index = { version = "5", features = [
  "rayon",
  "serde",
] } # https://github.com/oxc-project/oxc-index-vec
oxc_resolver = { version = "11.24.2", features = [
  "yarn_pnp",
] } # https://github.com/oxc-project/oxc-resolver
oxc_resolver_napi = { version = "11.24.2", default-features = false, features = ["yarn_pnp"] }
oxc_sourcemap = { version = "8.1.0" } # https://github.com/oxc-project/oxc-sourcemap

[profile.dev]
# Minimal debug info to speed up local and CI builds.
debug = "line-tables-only"

[profile.test]
# Minimal debug info to speed up local and CI builds.
debug = "line-tables-only"

[profile.release]
codegen-units = 1
debug = false # Set to `true` for debug information
lto = "fat"
opt-level = 3
strip = "symbols" # Set to `false` for debug information

[profile.release-debug]
debug = true
inherits = "release"

[profile.profile]
debug = "line-tables-only"
strip = false
lto = "thin"
inherits = "release"

[profile.release-wasi]
inherits = "release"
opt-level = "s"
# napi-rs generates *-debug.*.wasm files with these information
# it will strip these information for non-debug files
debug = "full"
strip = "none"
