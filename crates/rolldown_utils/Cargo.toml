[package]
name = "rolldown_utils"
version = "1.1.5"
publish = true
description = "General-purpose utilities for Rolldown"
readme = "../../README.md"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

edition.workspace = true
homepage.workspace = true
license.workspace = true
repository.workspace = true

[lib]

[[bench]]
harness = false
name = "concat_string"
path = "bench/concat_string.rs"

[lints]
workspace = true

[features]
async-runtime = ["dep:napi-async-runtime"]

[dependencies]
anyhow = { workspace = true }
arcstr = { workspace = true }
base-encode = { workspace = true }
base64-simd = { workspace = true }
cow-utils = { workspace = true }
dashmap = { workspace = true }
fast-glob = { workspace = true }
form_urlencoded = { workspace = true }
futures = { workspace = true }
indexmap = { workspace = true, features = ["serde"] }
infer = { workspace = true }
itoa = { workspace = true }
memchr = { workspace = true }
mime = { workspace = true }
# The shared scheduler behind the `async-runtime` feature; napi-free with
# default features off (the napi SPI adapter stays in rolldown_binding).
napi-async-runtime = { version = "0.1.0", git = "https://github.com/napi-rs/napi-rs.git", rev = "6d6ad3bb3dec52a3579ca949e93d7689ac523892", default-features = false, optional = true }
nom = { workspace = true }
oxc = { workspace = true }
oxc_index = { workspace = true }
oxc_str = { workspace = true }
regex = { workspace = true }
regress = { workspace = true }
rolldown_error = { workspace = true }
rolldown_std_utils = { workspace = true }
rustc-hash = { workspace = true }
serde_json = { workspace = true }
simdutf8 = { workspace = true }
sugar_path = { workspace = true }
# `time` backs the `time::sleep_until` facade's default (non-async-runtime)
# branch; tokio supports it on both wasm targets.
tokio = { workspace = true, features = ["rt", "time"] }
uuid = { workspace = true, features = ["v4"] }
xxhash-rust = { workspace = true, features = ["xxh3"] }

[target.'cfg(not(target_family = "wasm"))'.dependencies]
async-scoped = { workspace = true, features = ["use-tokio"] }
rayon = { workspace = true }

[dev-dependencies]
criterion2 = { workspace = true }
