[package]
name = "rolldown_utils"
version = "1.2.0"
publish = true
description = "General-purpose utilities for Rolldown"
readme = "../../README.md"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

edition.workspace = true
homepage.workspace = true
license.workspace = true
repository.workspace = true

[lib]

[[bench]]
harness = false
name = "concat_string"
path = "bench/concat_string.rs"

[lints]
workspace = true

[features]
# The tokio-free shared scheduler is the default. `tokio-runtime` is the opt-in
# fallback that restores the tokio spawn/timer facade arms (and pulls tokio in).
default = ["async-runtime"]
async-runtime = ["dep:napi-async-runtime"]
tokio-runtime = ["dep:tokio", "dep:async-scoped"]

[dependencies]
anyhow = { workspace = true }
arcstr = { workspace = true }
base-encode = { workspace = true }
base64-simd = { workspace = true }
cow-utils = { workspace = true }
dashmap = { workspace = true }
fast-glob = { workspace = true }
form_urlencoded = { workspace = true }
futures = { workspace = true }
indexmap = { workspace = true, features = ["serde"] }
infer = { workspace = true }
itoa = { workspace = true }
memchr = { workspace = true }
mime = { workspace = true }
# The shared scheduler behind the `async-runtime` feature; napi-free with
# default features off (the napi SPI adapter stays in rolldown_binding).
napi-async-runtime = { version = "0.1.0", git = "https://github.com/napi-rs/napi-rs.git", rev = "ad23bdeb8139be6e25eee508f18866c41c94d9b9", default-features = false, optional = true }
nom = { workspace = true }
oxc = { workspace = true }
oxc_index = { workspace = true }
oxc_str = { workspace = true }
regex = { workspace = true }
regress = { workspace = true }
rolldown_error = { workspace = true }
rolldown_std_utils = { workspace = true }
rustc-hash = { workspace = true }
serde_json = { workspace = true }
simdutf8 = { workspace = true }
sugar_path = { workspace = true }
# `time` backs the `time::sleep_until` facade's `tokio-runtime` (non-async-runtime)
# branch; tokio supports it on both wasm targets. Optional: pulled only by the
# opt-in `tokio-runtime` feature so the default build stays tokio-free.
tokio = { workspace = true, features = ["rt", "time"], optional = true }
uuid = { workspace = true, features = ["v4"] }
xxhash-rust = { workspace = true, features = ["xxh3"] }

[target.'cfg(not(target_family = "wasm"))'.dependencies]
# Only the `tokio-runtime` facade arm (block_on_spawn_all) uses async-scoped, so
# it is optional and pulled by the `tokio-runtime` feature.
async-scoped = { workspace = true, features = ["use-tokio"], optional = true }
rayon = { workspace = true }

[dev-dependencies]
criterion2 = { workspace = true }
