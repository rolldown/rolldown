[package]
name = "rolldown_watcher"
version = "1.1.5"
edition.workspace = true
homepage.workspace = true
license.workspace = true
repository.workspace = true
description = "Watcher for rolldown with state machine-based implementation"
readme = "../../README.md"

[lib]
doctest = false

[lints]
workspace = true

[dependencies]
anyhow = { workspace = true }
arcstr = { workspace = true }
futures = { workspace = true }
oxc_index = { workspace = true }
rolldown = { workspace = true, features = ["experimental"] }
rolldown_common = { workspace = true }
rolldown_error = { workspace = true }
rolldown_fs_watcher = { workspace = true }
rolldown-notify = { workspace = true }
rolldown_utils = { workspace = true }
# No `time` feature: the debounce timer goes through the
# `rolldown_utils::time::sleep_until` facade (runtime timer on async-runtime
# builds, tokio otherwise), never `tokio::time` directly.
tokio = { workspace = true, features = ["rt", "macros", "sync"] }
tracing = { workspace = true }

[dev-dependencies]
rolldown_workspace = { workspace = true }
sugar_path = { workspace = true }
# `time` here only serves examples/watch.rs's demo sleep.
tokio = { workspace = true, features = [
  "rt",
  "macros",
  "sync",
  "rt-multi-thread",
  "signal",
  "time",
] }
