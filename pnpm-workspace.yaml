  mocha: ^11.7.5
  oxc-minify: '=0.139.0'
  oxc-parser: '=0.139.0'
  oxc-transform: '=0.139.0'
  pathe: ^2.0.3
  react: ^19.0.0
  react-dom: ^19.0.0
