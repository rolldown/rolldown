trustPolicy: no-downgrade

trustPolicyExclude:
  - chokidar@4.0.3
  - semver@6.3.1
  - rxjs@7.8.2

verifyDepsBeforeRun: install

minimumReleaseAgeExclude:
  - '@napi-rs/cli@3.7.2'
  - '@napi-rs/wasm-runtime@1.1.6'
  - '@emnapi/core@1.11.2'
  - '@emnapi/runtime@1.11.2'
  - emnapi@1.11.2
  - '@emnapi/core@2.0.0-alpha.2'
  - '@emnapi/runtime@2.0.0-alpha.2'
  - '@emnapi/wasi-threads@2.0.0'
  - emnapi@2.0.0-alpha.2
  - '@oxc-minify/*'
  - '@oxc-parser/*'
  - '@oxc-transform/*'
  - '@oxc-project/*'
  - oxc-minify
  - oxc-parser
  - oxc-transform
  - '@voidzero-dev/*'
  - vite-plus
  - vitepress-plugin-feedback-tracker@0.2.0-alpha.1
  - void

# The published @napi-rs/wasm-runtime@1.1.6 declares @emnapi/core / @emnapi/runtime
# ^1.7.1 peers; napi-rs at a9c93cd5 ships the same 1.1.6 runtime source with the
# peers bumped to ^2.0.0-alpha.2 (patched below to add the @emnapi/core/plugins
# re-exports). Allow the v2 resolution the unpublished bump would declare.
peerDependencyRules:
  allowedVersions:
    '@napi-rs/wasm-runtime>@emnapi/core': 2.0.0-alpha.2
    '@napi-rs/wasm-runtime>@emnapi/runtime': 2.0.0-alpha.2
    '@napi-rs/cli>@emnapi/core': 2.0.0-alpha.2
    '@napi-rs/cli>@emnapi/runtime': 2.0.0-alpha.2

patchedDependencies:
  # TEMP: emnapi#220 fixes unshared-memory writes after reentrant callbacks,
  # re-targeted to the emnapi v2 line (napi-rs a9c93cd5 requires the v2 env
  # management ABI). Ports napi-rs's .yarn/patches/@emnapi-core-npm-2.0.0-alpha.2
  # patch plus the v1-patch fixes v2 still misses (TSFN dispatch send-on-throw,
  # enqueue liveSet-before-exchange, reentrant-call result DataView refresh).
  # The WASI loaders bundle this patched runtime so published consumers do not
  # need to reproduce the workspace patch. Remove after an upstream release.
  '@emnapi/core@2.0.0-alpha.2': patches/@emnapi__core@2.0.0-alpha.2.patch
  '@emnapi/wasi-threads@2.0.0': patches/@emnapi__wasi-threads@2.0.0.patch
  # TEMP: napi-rs at a9c93cd5 ships this same 1.1.6 runtime source with the
  # @emnapi/core/plugins re-exports (emnapiAsyncWorkPlugin / emnapiTSFNPlugin,
  # required by the emnapi v2 plugin split) and createContext. Verbatim copy of
  # that repo's runtime.cjs / runtime.js; drop once a v2-ready
  # @napi-rs/wasm-runtime is published.
  '@napi-rs/wasm-runtime@1.1.6': patches/@napi-rs__wasm-runtime@1.1.6.patch
  '@napi-rs/cli@3.7.2': patches/@napi-rs__cli@3.7.2.patch
  # TEMP: vendors napi-rs#3353 (wasm32-wasip1 single-thread support incl. the
  # deferred workerd-safe loader) with per-flavor WASI artifact naming plus the
  # emnapi v2 loader migration (EMNAPI_LINK_DIR per flavor, TSFN/async-work JS
  # plugins) — see internal-docs/async-runtime/implementation.md. Regenerated
  # from the napi pin `a9c93cd5` with its botched cli/ merge resolved to the
  # 56e32d5c (v3.10.5 line) side for build.ts/misc.ts/metadata.ts/version.ts/
  # load-wasi-template.ts (a9c93cd5 concatenated both parents' conflict hunks
  # and does not compile; the 56e32d5c side carries the emnapi-v2 loader
  # migration). dist rebuild of dist/index.cjs + dist/index.js + dist/cli.js —
  # cli.js is the standalone bundle behind the `napi` bin used by the publish
  # workflows. Remove once @napi-rs/cli ships it upstream.
