shellEmulator: true

trustPolicy: no-downgrade

trustPolicyExclude:
  - chokidar@4.0.3
  - semver@6.3.1
  - rxjs@7.8.2

verifyDepsBeforeRun: install

minimumReleaseAgeExclude:
  - '@napi-rs/cli@3.7.2'
  - '@napi-rs/wasm-runtime@1.1.6'
  - '@emnapi/core@1.11.2'
  - '@emnapi/runtime@1.11.2'
  - emnapi@1.11.2
  - '@oxc-minify/*'
  - '@oxc-parser/*'
  - '@oxc-transform/*'
  - '@oxc-project/*'
  - oxc-minify
  - oxc-parser
  - oxc-transform
  - '@voidzero-dev/*'
  - vite-plus
  - vitepress-plugin-feedback-tracker@0.2.0-alpha.1
  - void

patchedDependencies:
  # TEMP: emnapi#220 fixes unshared-memory writes after reentrant callbacks.
  # The WASI loaders bundle this patched runtime so published consumers do not
  # need to reproduce the workspace patch. Remove after an upstream release.
  '@emnapi/core@1.11.2': patches/@emnapi__core@1.11.2.patch
  # TEMP: the shared-memory part of emnapi#220 refreshes a stale worker-local
  # buffer before writing the wasi-threads thread-spawn result. This is bundled
  # into the produced loaders alongside @emnapi/core.
  '@emnapi/wasi-threads@1.2.2': patches/@emnapi__wasi-threads@1.2.2.patch
  '@napi-rs/cli@3.7.2': patches/@napi-rs__cli@3.7.2.patch
  # TEMP: vendors napi-rs#3353 (wasm32-wasip1 single-thread support incl. the
  # deferred workerd-safe loader) with per-flavor WASI artifact naming: the
  # threaded flavor keeps the legacy `wasm32-wasi` names, the single-thread
  # flavor gets its own `wasm32-wasip1` / `wasip1` names, and non-wasi builds
  # regenerate EVERY declared flavor's loader set deterministically — see
  # internal-docs/async-runtime/implementation.md. Regenerated from the
  # napi-rs commit `b58b5726b40c6228f8d3a9866b4158fa8eea2a25` (dist rebuild of
  # dist/index.cjs + dist/index.js + dist/cli.js — cli.js is the standalone
  # bundle behind the `napi` bin used by the publish workflows). Remove once
  # @napi-rs/cli ships it upstream.
