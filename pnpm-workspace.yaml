packages:
  - packages/*
  - packages/rolldown/tests
  - packages/test-dev-server/tests
  - packages/test-dev-server/tests/playground/*
  - packages/test-dev-server/tests/fixtures/*
  - packages/rolldown/tests/fixtures/resolve/issue-5846
  - packages/rolldown/tests/fixtures/resolve/issue-5846-2
  - packages/rolldown/tests/fixtures/tree-shake/module-side-effects-precedence/hook-side-effects-overrides-package-json
  - packages/rolldown/tests/fixtures/tree-shake/module-side-effects-precedence/option-over-package-json
  - docs
  - examples/*
  - scripts
  - crates/rolldown/tests/rolldown/topics/npm_packages
  - crates/rolldown/tests/rolldown/warnings/eval2
  - '!examples/yarn-pnp'

allowBuilds:
  better-sqlite3: true
  esbuild: true
  playwright-chromium: true
  sharp: true
  vue-demi: true
  workerd: true

# Kept for pnpm 10 (used on Node 20 in CI). pnpm 11 reads `allowBuilds` instead.
onlyBuiltDependencies:
  - '@parcel/watcher'
  - esbuild
  - oxc-resolver
  - sharp
  - tree-sitter

overrides:
  emnapi: 1.11.2
  vitepress>vite: npm:rolldown-vite@latest

catalog:
  '@babel/core': ^7.29.7
  '@babel/preset-env': ^7.29.7
  '@babel/preset-typescript': ^7.29.7
  '@napi-rs/cli': ^3.7.2
  '@napi-rs/wasm-runtime': ^1.1.6
  '@oxc-node/cli': ^0.1.0
  '@oxc-node/core': ^0.1.0
  '@oxc-project/runtime': '=0.139.0'
  '@oxc-project/types': '=0.139.0'
  '@pnpm/find-workspace-packages': ^6.0.9
  '@rolldown/pluginutils': ^1.0.0
  '@rollup/plugin-commonjs': ^29.0.0
  '@rollup/plugin-json': ^6.1.0
  '@rollup/plugin-node-resolve': ^16.0.0
  '@types/babel__core': 7.20.5
  '@types/connect': ^3.4.38
  '@types/fs-extra': ^11.0.4
  '@types/lodash-es': ^4.17.12
  '@types/mocha': 10.0.10
  '@types/node': 24.10.3
  '@types/semver': ^7.5.8
  '@types/serve-static': ^2.0.0
  buffer: ^6.0.3
  '@types/strip-comments': ^2.0.4
  '@types/ws': ^8.18.0
  acorn: ^8.17.0
  acorn-import-assertions: ^1.9.0
  astring: ^1.9.0
  buble: ^0.20.0
  cac: ^7.0.0
  chalk: ^5.3.0
  change-case: ^5.4.4
  connect: ^3.7.0
  consola: ^3.4.2
  dedent: ^1.5.3
  diff: ^9.0.0
  esbuild: ^0.28.0
  estree-toolkit: ^1.7.8
  execa: ^9.2.0
  fast-glob: ^3.3.3
  fixturify: ^3.0.0
  follow-redirects: ^1.15.6
  fresh-import: ^0.2.1
  fs-extra: ^11.3.2
  glob: ^13.0.0
  lodash-es: ^4.17.21
  micromatch: ^4.0.8
