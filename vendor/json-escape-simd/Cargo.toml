# Vendored copy of json-escape-simd 3.0.2 with a big-endian correctness fix.
#
# Upstream's portable `v128` fallback (the path used on targets without
# SSE2/AVX/NEON, e.g. s390x) builds its lane bitmask and reads the first
# escape offset with inconsistent bit ordering on big-endian, producing
# integer underflow / corrupted JSON string escaping. See
# `src/simd/v128.rs` (`Mask128::bitmask`) and `src/simd/bits.rs`
# (`first_offset` / `as_little_endian`) for the patched logic, and
# `rolldown-s390x-big-endian-analysis.md` for the full write-up.
#
# Patched in via `[patch.crates-io]` in the workspace root Cargo.toml so the
# fix applies to both rolldown's direct use and oxc_sourcemap's transitive use.
[package]
edition = "2024"
rust-version = "1.85.0"
name = "json-escape-simd"
version = "3.0.2"
description = "Optimized SIMD routines for escaping JSON strings. (vendored with big-endian fix)"
homepage = "https://github.com/napi-rs/json-escape-simd"
readme = "README.md"
license = "MIT"
repository = "https://github.com/napi-rs/json-escape-simd"
include = ["src/**/*.rs"]
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false

[features]
asan = []
avx512 = []

[lib]
name = "json_escape_simd"
path = "src/lib.rs"

[dependencies]
